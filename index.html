<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>表情镜 — 读书表情陪伴工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--bg-panel:#16162a;
  --text:#e0e0e0;--text-muted:#888;
  --accent:#6366f1;--accent-glow:rgba(99,102,241,.35);
  --danger:#ef4444;
  --border:rgba(255,255,255,.06);
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 40px rgba(0,0,0,.5);
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --transition:.35s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f0efe8;--bg-panel:#fff;
  --text:#2c2c2c;--text-muted:#999;
  --border:rgba(0,0,0,.06);--shadow:0 8px 40px rgba(0,0,0,.1);
}
[data-theme="warm"]{
  --bg:#1b1410;--bg-panel:#2a1f18;
  --text:#e8d5c0;--text-muted:#9b8c7c;
  --border:rgba(255,255,255,.04);
}

body{
  font-family:var(--font-ui);background:var(--bg);color:var(--text);
  height:100dvh;width:100vw;overflow:hidden;
  display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;
  transition:background var(--transition),color var(--transition);
}

/* Particle canvas */
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:5}

/* ============================================================
   Main Stage — centered mirror only
   ============================================================ */
#main-stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;z-index:10;
}

#mirror-ring{
  width:280px;height:280px;border-radius:50%;
  border:3px solid var(--border);background:#000;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow);
  transition:background var(--transition);
}

#mirror-ring video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transform:scaleX(-1);
}
#mirror-ring video.hidden{opacity:0}

/* Emoji avatar (shown when camera off) */
#avatar-face{
  font-size:130px;line-height:1;z-index:2;
  pointer-events:none;display:none;
  transition:transform .15s;
}
#avatar-face.bounce{
  animation:pop .5s cubic-bezier(.68,-.55,.265,1.55);
}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}

#mirror-ring .ring-label{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:12px;color:rgba(255,255,255,.55);
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  pointer-events:none;z-index:2;
}

#mirror-ring .cam-btn{
  position:absolute;bottom:10px;right:14px;
  width:34px;height:34px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.45);color:#fff;font-size:15px;
  cursor:pointer;z-index:5;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
  backdrop-filter:blur(4px);
}
#mirror-ring .cam-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5)}

/* Emotion info below mirror */
#emotion-info{text-align:center;margin-top:14px}
#emotion-info .main-label{font-size:22px;font-weight:700;letter-spacing:1px;transition:color .3s}
#emotion-info .sub-label{font-size:13px;color:var(--text-muted);margin-top:4px}

/* ============================================================
   Calibration Overlay
   ============================================================ */
#cal-overlay{
  position:absolute;inset:0;z-index:10;
  background:rgba(0,0,0,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;border-radius:50%;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
#cal-overlay.show{opacity:1;pointer-events:auto}
#cal-overlay .spinner{
  width:36px;height:36px;border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#cal-overlay .text{font-size:14px;font-weight:500;color:#fff}
#cal-overlay .bar{width:160px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#cal-overlay .bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .1s}

/* ============================================================
   Status Bar
   ============================================================ */
#status-bar{
  height:54px;display:flex;align-items:center;
  padding:0 18px;gap:14px;
  background:var(--bg-panel);border-top:1px solid var(--border);
  z-index:20;transition:background var(--transition);
}
#status-bar .emo-badge{
  display:flex;align-items:center;gap:5px;
  font-size:13px;font-weight:500;
  padding:5px 12px;border-radius:18px;
  background:rgba(255,255,255,.04);transition:all .5s;
}
#status-bar .emo-badge .emo{font-size:18px}
#status-bar .stat{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
#status-bar .spacer{flex:1}

#btn-read{
  padding:7px 24px;border-radius:22px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:var(--font-ui);letter-spacing:.5px;
  transition:all var(--transition);white-space:nowrap;
}
#btn-read.start{background:var(--accent);color:#fff;box-shadow:0 2px 14px var(--accent-glow)}
#btn-read.stop{background:var(--danger);color:#fff}
#btn-read:hover{transform:translateY(-1px)}
#btn-read:active{transform:scale(.97)}

.icon-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text);cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.icon-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ============================================================
   Panels
   ============================================================ */
.panel-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-back.open{opacity:1;pointer-events:auto}
.panel{
  position:fixed;top:0;bottom:0;width:360px;max-width:90vw;
  background:var(--bg-panel);z-index:55;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow);
  transition:transform .35s cubic-bezier(.4,0,.2,1),background var(--transition);
  overflow:hidden;
}
.panel.left{left:0;transform:translateX(-100%)}
.panel.right{right:0;transform:translateX(100%)}
.panel.open{transform:translateX(0)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-head h4{font-size:15px;font-weight:600}
.panel-head .close{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-size:16px}
.panel-head .close:hover{background:var(--danger);color:#fff}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px}

/* Settings */
.set-item{margin-bottom:18px}
.set-item label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.set-item input[type=range]{width:100%;accent-color:var(--accent)}
.set-item .range-ends{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted)}
.theme-row{display:flex;gap:7px}
.theme-opt{flex:1;padding:9px 4px;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;text-align:center;font-size:11px;transition:all var(--transition)}
.theme-opt:hover{border-color:var(--accent)}
.theme-opt.sel{border-color:var(--accent);background:rgba(99,102,241,.1)}
.theme-opt .dot{width:18px;height:18px;border-radius:50%;margin:0 auto 4px}
.set-item button{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font-ui);cursor:pointer}

/* Diary */
.d-empty{text-align:center;padding:36px 12px;color:var(--text-muted);font-size:13px}
.d-card{background:var(--bg);border-radius:var(--radius-sm);padding:13px;margin-bottom:10px;border:1px solid var(--border)}
.d-card .d-date{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.d-card .d-summary{font-size:12px;margin-bottom:6px}
.d-card .d-enc{font-size:11px;font-style:italic;color:var(--accent);margin-bottom:6px;line-height:1.4}
.d-card .d-btns{display:flex;gap:4px;flex-wrap:wrap}
.d-card .d-btns button{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:10px}
.d-card .d-btns button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.d-card .d-btns button.del:hover{background:var(--danger);border-color:var(--danger)}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-back.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--bg-panel);border-radius:var(--radius);width:480px;max-width:90vw;max-height:82vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border)}
.modal-box h4{font-size:15px;margin-bottom:14px}
.modal-box .emo-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.modal-box .emo-row .track{flex:1;height:15px;background:var(--bg);border-radius:8px;overflow:hidden}
.modal-box .emo-row .fill{height:100%;border-radius:8px}
.modal-box .m-btns{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
.modal-box .m-btns button{padding:7px 16px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:12px;transition:all var(--transition)}
.modal-box .m-btns button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-box .m-btns button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:20px;background:var(--bg-panel);color:var(--text);font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;border:1px solid var(--border)}
#toast.show{opacity:1}

/* ============================================================
   Bubble encouragement
   ============================================================ */
#bubble-container{position:fixed;inset:0;pointer-events:none;z-index:15}
.bubble{
  position:absolute;padding:10px 20px;border-radius:24px;
  font-size:14px;font-weight:500;white-space:nowrap;
  font-family:var(--font-ui);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 4px 24px rgba(0,0,0,.35);
  animation:bubbleUp 4.5s cubic-bezier(.22,.54,.36,.97) forwards;
  pointer-events:none;letter-spacing:.3px;
}
@keyframes bubbleUp{
  0%{opacity:0;transform:translateY(18px) scale(.75)}
  12%{opacity:1;transform:translateY(0) scale(1.06)}
  22%{transform:translateY(-6px) scale(1)}
  70%{opacity:.9}
  100%{opacity:0;transform:translateY(-140px) scale(.85)}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

@media(max-width:768px){
  #mirror-ring{width:200px;height:200px}
  #avatar-face{font-size:90px}
  #status-bar{padding:0 10px;gap:8px;height:46px}
  .panel{width:100vw;max-width:100vw}
}
</style>
</head>
<body data-theme="dark">

<canvas id="particle-canvas"></canvas>

<div id="main-stage">
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div id="mirror-ring">
      <video id="video" autoplay playsinline></video>
      <span id="avatar-face"></span>
      <span class="ring-label" id="ring-label">你</span>
      <button class="cam-btn" id="cam-btn" title="切换摄像头/表情">📷</button>

      <div id="cal-overlay">
        <div class="spinner" id="cal-spinner"></div>
        <div class="text" id="cal-text">正在下载模型…</div>
        <div class="bar"><div class="bar-fill" id="cal-bar-fill"></div></div>
      </div>
    </div>
    <div id="emotion-info">
      <div class="main-label" id="emotion-label" style="color:#60a5fa">等待开始</div>
      <div class="sub-label" id="emotion-sub">校准完成后点击开始阅读</div>
    </div>
  </div>
</div>

<div id="bubble-container"></div>

<div id="status-bar">
  <div class="emo-badge" id="emo-badge"><span class="emo">😐</span><span id="status-emotion">中性</span></div>
  <span class="stat">⏱ <span id="timer">00:00</span></span>
  <span class="spacer"></span>
  <button id="btn-read" class="start">▶ 开始阅读</button>
  <button class="icon-btn" id="btn-diary">📔</button>
  <button class="icon-btn" id="btn-settings">⚙️</button>
</div>

<div class="panel-back" id="settings-back"></div>
<div class="panel left" id="settings-panel">
  <div class="panel-head"><h4>⚙️ 设置</h4><button class="close" id="close-settings">✕</button></div>
  <div class="panel-body">
    <div class="set-item">
      <label>表情识别灵敏度</label>
      <input type="range" id="s-sensitivity" min="1" max="10" value="5">
      <div class="range-ends"><span>稳定</span><span>灵敏</span></div>
    </div>
    <div class="set-item">
      <label>视觉反馈强度</label>
      <input type="range" id="s-intensity" min="1" max="10" value="6">
      <div class="range-ends"><span>柔和</span><span>强烈</span></div>
    </div>
    <div class="set-item">
      <label>主题</label>
      <div class="theme-row">
        <div class="theme-opt sel" data-theme="dark"><div class="dot" style="background:#16162a"></div>暗夜</div>
        <div class="theme-opt" data-theme="light"><div class="dot" style="background:#f5f5f0"></div>明亮</div>
        <div class="theme-opt" data-theme="warm"><div class="dot" style="background:#2a1f18"></div>暖棕</div>
      </div>
    </div>
    <div class="set-item">
      <button id="btn-export-all">📤 导出全部日记 (JSON)</button>
      <button id="btn-clear-all" style="margin-top:7px;color:var(--danger);border-color:var(--danger)">🗑 清除全部数据</button>
    </div>
  </div>
</div>

<div class="panel-back" id="diary-back"></div>
<div class="panel right" id="diary-panel">
  <div class="panel-head"><h4>📔 读书日记</h4><button class="close" id="close-diary">✕</button></div>
  <div class="panel-body" id="diary-scroll">
    <div class="d-empty">还没有读书日记<br>开始你的第一次阅读吧 ✨</div>
  </div>
</div>

<div class="modal-back" id="modal-back"><div class="modal-box" id="modal-box"></div></div>
<div id="toast"></div>

<script type="module">
/* ============================================================
   CONFIG
   ============================================================ */
const CFG={fps:10,camW:640,camH:480,baselineFrames:15,maxParticles:200};

/* ============================================================
   DOM
   ============================================================ */
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const D={
  mirrorRing:$('#mirror-ring'),video:$('#video'),
  avatarFace:$('#avatar-face'),ringLabel:$('#ring-label'),
  camBtn:$('#cam-btn'),emotionLabel:$('#emotion-label'),emotionSub:$('#emotion-sub'),
  statusEmo:$('#emo-badge .emo'),statusLabel:$('#status-emotion'),
  emoBadge:$('#emo-badge'),timer:$('#timer'),
  btnRead:$('#btn-read'),calOverlay:$('#cal-overlay'),
  calSpinner:$('#cal-spinner'),calText:$('#cal-text'),calBarFill:$('#cal-bar-fill'),
  settingsPanel:$('#settings-panel'),settingsBack:$('#settings-back'),
  diaryPanel:$('#diary-panel'),diaryBack:$('#diary-back'),
  diaryScroll:$('#diary-scroll'),modalBack:$('#modal-back'),modalBox:$('#modal-box'),
  toast:$('#toast'),pCvs:$('#particle-canvas'),pctx:null,
};

/* ============================================================
   STATE
   ============================================================ */
const S={
  isReading:false,sessionStart:null,sessionSeconds:0,timerInt:null,
  emotionHistory:[],baseline:null,
  cur:{emotion:'neutral',intensity:0,confidence:0},
  fl:null,cameraStream:null,
  calibrated:false,calibrating:false,visible:true,
  particles:[],animId:null,
  settings:{sensitivity:5,intensity:6,theme:'dark'},
  cameraOn:true,pipMode:null,pipWindow:null,
  // Temporal tracking for "focused" detection
  recentExpr:[],
};

/* ============================================================
   7 EMOTIONS — expanded detection
   ============================================================ */
const EM={
  neutral:  {emoji:'😐',label:'中性',  color:'#60a5fa',pc:['#60a5fa','#93c5fd','#a5b4fc']},
  frowning: {emoji:'😠',label:'皱眉',  color:'#f59e0b',pc:['#f59e0b','#ef4444','#f97316']},
  smiling:  {emoji:'😊',label:'微笑',  color:'#fbbf24',pc:['#fbbf24','#fcd34d','#fde68a']},
  confused: {emoji:'🤔',label:'困惑',  color:'#a78bfa',pc:['#8b5cf6','#a78bfa','#c4b5fd']},
  surprised:{emoji:'😮',label:'惊讶',  color:'#fff',   pc:['#fff','#e0e7ff','#c7d2fe']},
  focused:  {emoji:'🧐',label:'专注',  color:'#34d399',pc:['#34d399','#6ee7b7','#a7f3d0']},
  sad:      {emoji:'😢',label:'难过',  color:'#818cf8',pc:['#818cf8','#a5b4fc','#c7d2fe']},
};
const EKEYS=Object.keys(EM);

const PC={
  neutral:  {sp:.3,sz:4,li:140,rate:2, dr:.2},
  frowning: {sp:.5,sz:5,li:100,rate:5, dr:.1},
  smiling:  {sp:.7,sz:3,li:70, rate:8, dr:.4},
  confused: {sp:.2,sz:6,li:170,rate:3, dr:.5},
  surprised:{sp:2, sz:7,li:35, rate:12,dr:.6},
  focused:  {sp:.15,sz:3,li:200,rate:1, dr:.3},
  sad:      {sp:.3,sz:4,li:160,rate:2, dr:.15},
};

/* ============================================================
   PARTICLE SYSTEM
   ============================================================ */
class Particle{
  constructor(x,y,em){const c=PC[em],cl=EM[em].pc;this.x=x;this.y=y;this.vx=(Math.random()-.5)*c.sp*2;this.vy=(Math.random()-.5)*c.sp*2-c.sp*.5;this.l=c.li*(.7+Math.random()*.6);this.ml=this.l;this.s=c.sz*(.5+Math.random());this.co=cl[Math.floor(Math.random()*cl.length)];this.dr=c.dr}
  up(){this.x+=this.vx;this.y+=this.vy;this.vx+=(Math.random()-.5)*this.dr;this.vy+=(Math.random()-.5)*this.dr;this.vx*=.995;this.vy*=.995;this.l--;return this.l>0}
  dr(ctx){const a=Math.max(0,this.l/this.ml),s=this.s*(.5+.5*a);ctx.save();ctx.globalAlpha=a*.6;ctx.fillStyle=this.co;ctx.shadowColor=this.co;ctx.shadowBlur=s*2;ctx.beginPath();ctx.arc(this.x,this.y,s,0,Math.PI*2);ctx.fill();ctx.restore()}
}
function spawnParticles(em,intensity){
  const f=S.settings.intensity/10,c=PC[em],n=Math.floor(c.rate*intensity*f);
  const r=D.mirrorRing.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=120+Math.random()*200;S.particles.push(new Particle(cx+Math.cos(a)*d,cy+Math.sin(a)*d,em))}
  while(S.particles.length>CFG.maxParticles)S.particles.shift();
}
function particleLoop(){
  const c=D.pctx;c.clearRect(0,0,innerWidth,innerHeight);
  S.particles=S.particles.filter(p=>{const a=p.up();if(a)p.dr(c);return a});
  S.animId=requestAnimationFrame(particleLoop);
}
function setupCanvas(){
  D.pctx=D.pCvs.getContext('2d',{alpha:true});
  const rz=()=>{D.pCvs.width=innerWidth*devicePixelRatio;D.pCvs.height=innerHeight*devicePixelRatio;D.pCvs.style.width=innerWidth+'px';D.pCvs.style.height=innerHeight+'px';D.pctx.scale(devicePixelRatio,devicePixelRatio)};
  rz();window.addEventListener('resize',rz);
}

/* ============================================================
   PICTURE-IN-PICTURE — Canvas PiP 保活摄像头（Safari/Chrome/Firefox 通用）
   ============================================================ */
S.pipVideo=null;S.pipCanvas=null;S.pipCtx=null;S.pipEmoji='😐';S.pipLabel='';S.pipColor='#60a5fa';

function ensurePiPElements(){
  if(S.pipCanvas)return;
  S.pipCanvas=document.createElement('canvas');
  S.pipCanvas.id='pip-canvas';
  S.pipCanvas.width=256;S.pipCanvas.height=256;
  S.pipCtx=S.pipCanvas.getContext('2d');
  S.pipVideo=document.createElement('video');
  S.pipVideo.id='pip-video';
  S.pipVideo.muted=true;S.pipVideo.playsInline=true;
  S.pipVideo.srcObject=S.pipCanvas.captureStream(10);
  S.pipVideo.play();
  document.body.appendChild(S.pipCanvas);
  document.body.appendChild(S.pipVideo);
  // 隐藏：用 CSS 控制，不能 display:none 否则 PiP 失效

  S.pipVideo.style.cssText='position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none';

function drawPiPFrame(){
  if(!S.pipCtx)return;
  const c=S.pipCtx,w=S.pipCanvas.width,h=S.pipCanvas.height;
  c.clearRect(0,0,w,h);
  // 暗色背景
  const bg=c.createRadialGradient(w/2,h/2,w*.05,w/2,h/2,w*.7);
  bg.addColorStop(0,'#1e1b4b');bg.addColorStop(1,'#0d0d1a');
  c.fillStyle=bg;c.fillRect(0,0,w,h);
  // emoji
  c.font='96px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText(S.pipEmoji,w/2,h/2-12);
  // label with color
  c.font='bold 22px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  c.fillStyle=S.pipColor;
  c.fillText(S.pipLabel,w/2,h/2+60);
  // ring accent
  c.strokeStyle=S.pipColor+'55';c.lineWidth=2;
  c.beginPath();c.arc(w/2,h/2,80,0,Math.PI*2);c.stroke();
}

const BUBBLE_MSGS={

  sad: ['有些文字就是触动人心','感受它，没关系的','共情是一种力量'],
  smiling: ['看来这里很有趣！','阅读的快乐 😊','享受这一刻','书中自有黄金屋'],
  surprised: ['哇，有新发现！','惊喜时刻！','意想不到的收获'],
  focused: ['你进入了心流状态','专注的你最棒','完全沉浸在书中了','此刻无人能打扰你'],
  neutral: ['保持状态，慢慢来','稳稳地读下去'],
};
let _bubbleCD={};
let _lastBubble=0;

function spawnBubble(emotion){
  const now=Date.now();
  if(now-_lastBubble<8000)return;
  if(now-(_bubbleCD[emotion]||0)<20000)return;
  const msgs=BUBBLE_MSGS[emotion];
  if(!msgs||!msgs.length)return;
  _bubbleCD[emotion]=now;
  _lastBubble=now;
  const msg=msgs[Math.floor(Math.random()*msgs.length)];
  const e=EM[emotion];
  const b=document.createElement('div');
  b.className='bubble';
  b.textContent=e.emoji+' '+msg;
  b.style.background=e.color+'18';
  b.style.color=e.color;
  b.style.borderColor=e.color+'33';
  const ring=D.mirrorRing.getBoundingClientRect();
  const x=ring.left+ring.width/2+(Math.random()-.5)*100;
  const y=ring.top-16;
  b.style.left=x+'px';b.style.top=y+'px';
  document.getElementById('bubble-container').appendChild(b);
  b.addEventListener('animationend',()=>b.remove());
}

/* ============================================================
   FACIAL METRICS — extended
   ============================================================ */
const d3=(a,b)=>Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+((a.z||0)-(b.z||0))**2);
function computeMetrics(lm){
  const ed=d3(lm[33],lm[263])||.01,n=v=>v/ed;

  // Mouth
  const mw=d3(lm[61],lm[291]),mh=d3(lm[13],lm[14]),mr=n(mh/(mw||.01));
  // Mouth corner angle: positive = corners up, negative = corners down
  const mouthAngle=(lm[61].y-lm[291].y)/(mw||.01);

  // Eyes
  const le=d3(lm[159],lm[145])/(d3(lm[33],lm[133])||.01);
  const re=d3(lm[386],lm[374])/(d3(lm[362],lm[263])||.01);
  const ear=(le+re)/2;

  // Eyebrows
  const lbh=n(lm[159].y-lm[105].y),rbh=n(lm[386].y-lm[334].y),abh=(lbh+rbh)/2;
  const ibd=n(d3(lm[107],lm[336])); // inner brow distance

  // Inner brow height (for sad: inner brow goes UP)
  const libh=n(lm[159].y-lm[107].y),ribh=n(lm[386].y-lm[336].y);
  const innerBrowH=(libh+ribh)/2;

  // Nose wrinkle
  const nw=n(d3(lm[1],lm[168]));

  return{mouthRatio:mr,mouthAngle,avgEAR:ear,avgBrowH:abh,innerBrowDist:ibd,innerBrowH,noseWrinkle:nw};
}

/* ============================================================
   CALIBRATION
   ============================================================ */
function calibrate(samples){
  const avg=k=>samples.reduce((s,m)=>s+m[k],0)/samples.length;
  const keys=['mouthRatio','mouthAngle','avgEAR','avgBrowH','innerBrowDist','innerBrowH','noseWrinkle'];
  const b={};for(const k of keys)b[k]=avg(k);
  b.stds={};for(const k of keys){const m=b[k];b.stds[k]=Math.sqrt(samples.reduce((s,x)=>s+(x[k]-m)**2,0)/samples.length)||.001}
  // Auto-detect glasses: lower brows + tighter inner brow distance than typical
  b.hasGlasses=(b.innerBrowDist<0.75&&b.avgBrowH<0.21);
  // Brow signals are ~40% less reliable for glasses wearers — store bias factor
  b.browFactor=b.hasGlasses?1.6:1.0;
  return b;
}

/* ============================================================
   EXPRESSION DETECTION — 7 emotions, glasses-aware
   ============================================================ */
const clamp=v=>Math.max(0,Math.min(1,v));

function detectExpression(m,bl){
  if(!bl)return{emotion:'neutral',intensity:0,confidence:0};
  const z=(v,k)=>(v-bl[k])/bl.stds[k];
  const se=S.settings.sensitivity/5,th=1.8/se;
  const bf=bl.browFactor||1; // 1.0 normal, 1.6 for glasses

  const mrZ=z(m.mouthRatio,'mouthRatio');      // mouth open width
  const maZ=z(m.mouthAngle,'mouthAngle');      // corners up(+) / down(-)
  const bhZ=z(m.avgBrowH,'avgBrowH');          // brow height
  const ibZ=-z(m.innerBrowDist,'innerBrowDist');// inner brows closer
  const earZ=z(m.avgEAR,'avgEAR');             // eye openness
  const ibhZ=z(m.innerBrowH,'innerBrowH');     // inner brow height
  const nwZ=z(m.noseWrinkle,'noseWrinkle');    // nose wrinkle

  // All scores start from 0, neutral gets a small floor
  let sc={neutral:.2,frowning:0,smiling:0,confused:0,surprised:0,focused:0,sad:0};

  // ===== SMILE: mouth-first (unaffected by glasses) =====
  // Smile = mouth widens + corners lift. Very reliable standalone signal.
  const mouthSmile=(mrZ*0.5+maZ*0.5)/th;
  if(mouthSmile>.5) sc.smiling=clamp(mouthSmile/2.5);

  // ===== FROWNING: brows together + brows lowered, GLASSES-AWARE =====
  // Thresholds widen when bf > 1.0
  const fITh=0.55*bf; // inner brow closeness threshold (was 0.6)
  const fBTh=-0.25*bf;// brow height threshold (was -0.3)
  if(ibZ>fITh&&bhZ<fBTh){
    sc.frowning=clamp(((ibZ-fITh)/(2*bf))*.5+((-bhZ+fBTh)/(2*bf))*.5);
  }

  // ===== SURPRISED: brows way up + mouth open + eyes wide =====
  if(bhZ>th*.7&&mrZ>th*.7&&earZ>th*.4){
    sc.surprised=clamp((bhZ/(th*3)+mrZ/(th*2)+earZ/(th*2))/3);
  }

  // ===== CONFUSED: brows together + eyes squinted =====
  const cITh=0.35*bf;
  if(ibZ>cITh&&earZ<-.3){
    sc.confused=clamp(((ibZ-cITh)/(2*bf))*.5+((-earZ)/th)*.5);
  }

  // ===== FOCUSED: mild brow convergence + stable neutral over time =====
  if(ibZ>.2&&ibZ<.9&&Math.abs(mrZ)<.8&&Math.abs(maZ)<.6&&earZ>-.3){
    const s=clamp(S.recentExpr.filter(e=>e==='focused'||e==='neutral').length/7);
    sc.focused=clamp(ibZ/(th+bf)*.4+s*.6);
  }

  // ===== SAD: inner brows UP + mouth corners down =====
  if(ibhZ>.4&&maZ<-.4&&Math.abs(mrZ)<.6){
    sc.sad=clamp(ibhZ/th*.5+((-maZ-.4)/th)*.5);
  }

  // ===== MUTUAL EXCLUSION =====
  // Smile and frown cannot coexist — smile wins on tie
  if(sc.smiling>.35){sc.frowning*=.15;sc.confused*=.25;sc.sad*=.3;}
  // Frown suppresses focused & neutral
  if(sc.frowning>.35){sc.focused*=.15;sc.neutral*=.4;}
  // Confused suppresses neutral
  if(sc.confused>.3) sc.neutral*=.4;

  // Normalize
  const total=Object.values(sc).reduce((a,b)=>a+b,0)||1;
  for(const k of EKEYS)sc[k]/=total;

  let dom='neutral',mx=sc.neutral;
  for(const[e,v]of Object.entries(sc)){if(v>mx){mx=v;dom=e;}}

  S.recentExpr.push(dom);if(S.recentExpr.length>10)S.recentExpr.shift();

  return{emotion:dom,intensity:clamp(mx),confidence:clamp(mx)};
}

/* ============================================================
   DETECTION
   ============================================================ */
let _lastEmo='';
function detectFace(){
  if(!S.fl||!S.visible)return;
  if(D.video.readyState<2)return;
  const r=S.fl.detectForVideo(D.video,performance.now());
  if(!r.faceLandmarks||!r.faceLandmarks.length){if(S.isReading)S.cur={emotion:'neutral',intensity:0,confidence:0};return}
  const m=computeMetrics(r.faceLandmarks[0]);

  if(S.calibrating){
    if(!S._samples)S._samples=[];
    S._samples.push(m);const pct=Math.min(1,S._samples.length/CFG.baselineFrames);
    D.calBarFill.style.width=(pct*100)+'%';
    if(S._samples.length<=3)D.calText.textContent='正在分析面部特征…';
    else D.calText.textContent='正在校准…('+S._samples.length+'/'+CFG.baselineFrames+')';
    if(S._samples.length>=CFG.baselineFrames){S.baseline=calibrate(S._samples);S.calibrated=true;S.calibrating=false;S._samples=null;stopLoop();D.calOverlay.classList.remove('show');updateUI({emotion:'neutral',intensity:0});D.emotionSub.textContent='可以开始阅读了 ✨';const g=S.baseline.hasGlasses?'（已检测到眼镜，自动调整识别参数）':'';toast('✅ 校准完成！'+g);console.log('📐 Calibrated. Glasses:',S.baseline.hasGlasses,'Brow factor:',S.baseline.browFactor)}
    return;
  }
  if(!S.calibrated)return;
  const expr=detectExpression(m,S.baseline);
  if(S.isReading){const prev=S.cur.emotion;S.cur=expr;if(expr.intensity>.15)spawnParticles(expr.emotion,expr.intensity);if(expr.intensity>.35&&prev!==expr.emotion&&['frowning','confused','sad','smiling','surprised','focused'].includes(expr.emotion))spawnBubble(expr.emotion)}
  updateUI(expr);
}

function updateUI(expr){
  const{emotion,intensity}=expr,e=EM[emotion]||EM.neutral;
  // Avatar face (when camera off)
  if(!S.cameraOn){D.avatarFace.textContent=e.emoji;if(emotion!==_lastEmo&&intensity>.25){D.avatarFace.classList.remove('bounce');void D.avatarFace.offsetWidth;D.avatarFace.classList.add('bounce')}}
  _lastEmo=emotion;
  D.ringLabel.textContent=S.cameraOn?'你':'表情映射';
  D.emotionLabel.textContent=e.label;D.emotionLabel.style.color=e.color;
  D.statusEmo.textContent=e.emoji;D.statusLabel.textContent=e.label;
  D.emoBadge.style.borderColor=e.color;D.emoBadge.style.boxShadow='0 0 10px '+e.color+'33';
  updatePiP(e.emoji,e.label,e.color);
}

/* ============================================================
   DIARY
   ============================================================ */
function genDiary(mins){
  const h=S.emotionHistory,total=h.length||1;
  const dist={};for(const k of EKEYS)dist[k]=0;
  for(const s of h)dist[s.emotion]=(dist[s.emotion]||0)+1;
  const pct={};for(const[k,v]of Object.entries(dist))pct[k]=Math.round(v/total*100);
  let hardest={time:0,emotion:'neutral',pct:0};let mx=0;const WIN=180;
  for(let i=0;i<h.length;i++){const end=h[i].second,start=end-WIN;const ws=h.filter(s=>s.second>=start&&s.second<=end);const neg=ws.filter(s=>s.emotion==='frowning'||s.emotion==='confused'||s.emotion==='sad').length;if(neg>mx&&ws.length>10){mx=neg;const nw=ws.filter(s=>s.emotion==='frowning'||s.emotion==='confused'||s.emotion==='sad');hardest={time:Math.round(start/60),emotion:nw.filter(s=>s.emotion==='frowning').length>=nw.length/2?'frowning':(nw.filter(s=>s.emotion==='sad').length>=nw.length/2?'sad':'confused'),pct:Math.round(neg/ws.length*100)}}}
  let best=0,cur=0;for(const s of h){if(s.emotion==='neutral'||s.emotion==='focused'||s.emotion==='confused'){cur++;best=Math.max(best,cur)}else cur=0}
  const focus=Math.round(best/60*10)/10,enc=genEnc(pct,mins,hardest,focus);
  return{id:new Date().toISOString().replace(/[:.]/g,'-'),date:fmt(new Date()),timestamp:Date.now(),durationMinutes:mins,emotionDistribution:pct,hardestMoment:hardest,longestFocusMinutes:focus,encouragementText:enc};
}
function genEnc(pct,mins,hardest,focus){
  const t=[];
  if((pct.frowning||0)>25&&mins>20)t.push('今天有 '+(pct.frowning||0)+'% 的时间在皱眉，但你坚持了 '+mins+' 分钟，了不起。');
  if(hardest.time>0&&hardest.pct>40)t.push('第 '+hardest.time+' 分钟左右遇到了最难啃的一段，但你没有放弃。');
  if((pct.smiling||0)>15)t.push('微笑占比 '+(pct.smiling||0)+'%，这本书给了你不少惊喜。');
  if((pct.focused||0)>30&&mins>15)t.push('有 '+(pct.focused||0)+'% 的时间高度专注，你进入了心流状态。');
  if(focus>10)t.push('曾连续专注了 '+focus+' 分钟，完全沉浸在书里。');
  if((pct.sad||0)>15)t.push((pct.sad||0)+'% 的难过时光——有些书就是会触动心底最柔软的地方。');
  if(!t.length)t.push(mins<5?'虽然只读了 '+mins+' 分钟，每一分钟都在认真思考。':'读了 '+mins+' 分钟，每次翻页都是向前一步。');
  return t[Math.floor(Math.random()*t.length)];
}

   ============================================================ */
function updateTimer(){const m=Math.floor(S.sessionSeconds/60),s=S.sessionSeconds%60;D.timer.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function toast(msg){const t=D.toast;t.textContent=msg;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2500)}
function togglePanel(p,b){const o=p.classList.contains('open');$$('.panel.open').forEach(x=>x.classList.remove('open'));$$('.panel-back.open').forEach(x=>x.classList.remove('open'));if(!o){p.classList.add('open');b.classList.add('open')}}

function renderDiaryList(){
  const l=loadDiaries(),c=D.diaryScroll;if(!l.length){c.innerHTML='<div class="d-empty">还没有日记<br>开始吧 ✨</div>';return}
  c.innerHTML=l.map(d=>'<div class="d-card"><div class="d-date">📅 '+d.date+'</div><div class="d-summary">⏱ '+d.durationMinutes+' 分钟 | '+EKEYS.filter(k=>(d.emotionDistribution[k]||0)>5).map(k=>EM[k].emoji+(d.emotionDistribution[k]||0)+'%').join(' ')+'</div><div class="d-enc">💬 '+d.encouragementText+'</div><div class="d-btns"><button class="view" data-id="'+d.id+'">📋 详情</button><button class="json" data-id="'+d.id+'">JSON</button><button class="md" data-id="'+d.id+'">MD</button><button class="del" data-id="'+d.id+'">🗑</button></div></div>').join('');
  c.querySelectorAll('.view').forEach(b=>b.onclick=()=>{const d=l.find(x=>x.id===b.dataset.id);if(d)showDetail(d)});
  c.querySelectorAll('.json').forEach(b=>b.onclick=()=>{const d=l.find(x=>x.id===b.dataset.id);if(d)exportDiary(d,'json')});
  c.querySelectorAll('.md').forEach(b=>b.onclick=()=>{const d=l.find(x=>x.id===b.dataset.id);if(d)exportDiary(d,'md')});
  c.querySelectorAll('.del').forEach(b=>b.onclick=()=>{if(confirm('删除？'))deleteDiary(b.dataset.id)});
}
function showDetail(diary){
  const d=diary.emotionDistribution,b=D.modalBox,bk=D.modalBack;
  b.innerHTML='<h4>📔 '+diary.date+'</h4><p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">⏱ '+diary.durationMinutes+' 分钟</p><div>'+EKEYS.map(k=>'<div class="emo-row"><span>'+EM[k].emoji+' '+EM[k].label+'</span><div class="track"><div class="fill" style="width:'+(d[k]||0)+'%;background:'+EM[k].color+';"></div></div><span style="font-size:11px;color:var(--text-muted);">'+(d[k]||0)+'%</span></div>').join('')+'</div><p style="font-size:12px;color:var(--text-muted);margin-top:10px;">💪 最难: 第 '+diary.hardestMoment.time+' 分钟 · '+EM[diary.hardestMoment.emotion]?.label+'</p><p style="font-size:12px;color:var(--text-muted);">📚 专注 '+diary.longestFocusMinutes+' 分钟</p><p style="font-size:12px;color:var(--accent);font-style:italic;margin-top:8px;">💬 '+diary.encouragementText+'</p><div class="m-btns"><button class="primary" id="m-json">📥 JSON</button><button class="primary" id="m-md">📥 MD</button><button id="m-del" style="color:var(--danger);border-color:var(--danger)">🗑 删除</button><button id="m-close">关闭</button></div>';
  bk.classList.add('open');
  $('#m-close').onclick=()=>bk.classList.remove('open');$('#m-json').onclick=()=>exportDiary(diary,'json');
  $('#m-md').onclick=()=>exportDiary(diary,'md');$('#m-del').onclick=()=>{if(confirm('删除？')){deleteDiary(diary.id);bk.classList.remove('open')}};
  bk.onclick=e=>{if(e.target===bk)bk.classList.remove('open')};
}

/* ============================================================
   SETTINGS
   ============================================================ */
function loadSettings(){try{const s=JSON.parse(localStorage.getItem(KC));if(s)S.settings={...S.settings,...s}}catch(e){}applySettings()}
function saveSettings(){localStorage.setItem(KC,JSON.stringify(S.settings))}
function applySettings(){const s=S.settings;$('#s-sensitivity').value=s.sensitivity;$('#s-intensity').value=s.intensity;document.body.dataset.theme=s.theme;$$('.theme-opt').forEach(o=>o.classList.toggle('sel',o.dataset.theme===s.theme))}

/* ============================================================
   CAMERA TOGGLE
   ============================================================ */
function toggleCamera(){
  S.cameraOn=!S.cameraOn;
  if(S.cameraOn){D.video.classList.remove('hidden');D.camBtn.textContent='📷';D.camBtn.title='切换为表情映射';D.ringLabel.textContent='你';D.mirrorRing.style.background='#000';D.avatarFace.style.display='none'}
  else{D.video.classList.add('hidden');D.camBtn.textContent='🎭';D.camBtn.title='显示摄像头';D.ringLabel.textContent='表情映射';D.avatarFace.textContent=EM[S.cur.emotion]?.emoji||'😐';D.avatarFace.style.display='flex';D.mirrorRing.style.background='var(--bg-panel)'}
}

/* ============================================================
   EVENTS
   ============================================================ */
function bindEvents(){
  D.btnRead.onclick=()=>S.isReading?stopReading():startReading();
  D.camBtn.onclick=e=>{e.stopPropagation();toggleCamera()};
  $('#btn-diary').onclick=()=>{renderDiaryList();togglePanel(D.diaryPanel,D.diaryBack)};
  $('#close-diary').onclick=()=>{D.diaryPanel.classList.remove('open');D.diaryBack.classList.remove('open')};
  D.diaryBack.onclick=()=>{D.diaryPanel.classList.remove('open');D.diaryBack.classList.remove('open')};
  $('#btn-settings').onclick=()=>togglePanel(D.settingsPanel,D.settingsBack);
  $('#close-settings').onclick=()=>{D.settingsPanel.classList.remove('open');D.settingsBack.classList.remove('open')};
  D.settingsBack.onclick=()=>{D.settingsPanel.classList.remove('open');D.settingsBack.classList.remove('open')};
  $('#s-sensitivity').oninput=e=>{S.settings.sensitivity=+e.target.value;saveSettings()};
  $('#s-intensity').oninput=e=>{S.settings.intensity=+e.target.value;saveSettings()};
  $$('.theme-opt').forEach(o=>o.onclick=()=>{S.settings.theme=o.dataset.theme;saveSettings();applySettings()});
  $('#btn-export-all').onclick=exportAllDiaries;
  $('#btn-clear-all').onclick=clearAllData;
  document.onkeydown=e=>{if(e.key==='Escape'){$$('.panel.open').forEach(p=>p.classList.remove('open'));$$('.panel-back.open').forEach(b=>b.classList.remove('open'));D.modalBack.classList.remove('open')}};
}

document.addEventListener('visibilitychange',()=>{if(document.hidden&&!S.pipMode)S.visible=false;else if(!document.hidden)S.visible=true});
window.addEventListener('beforeunload',()=>{if(S.isReading&&S.emotionHistory.length>10){saveDiary(genDiary(Math.round(S.sessionSeconds/60*10)/10))}});

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  setupCanvas();S.animId=requestAnimationFrame(particleLoop);
  loadSettings();bindEvents();
  const camOk=await setupCamera();if(!camOk)return;
  D.calOverlay.classList.add('show');D.calBarFill.style.width='0%';D.calText.textContent='正在下载模型…';
  const flOk=await setupFL();if(!flOk)return;
  D.calSpinner.style.display='none';S.calibrating=true;S._samples=[];D.calText.textContent='正在分析面部特征…';
  startLoop();
}
init().catch(err=>{console.error(err);toast('⚠️ 初始化失败，请刷新')});
</script>
</body>
</html>
