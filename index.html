<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>表情镜 v4.0 — 翻转陪伴</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--bg-panel:#16162a;--bg-card:#111122;
  --text:#e0e0e0;--text-muted:#888;
  --accent:#6366f1;--accent-glow:rgba(99,102,241,.35);
  --danger:#ef4444;
  --border:rgba(255,255,255,.06);
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 40px rgba(0,0,0,.5);
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --transition:.35s cubic-bezier(.4,0,.2,1);
  --dot-calm:#60a5fa;--dot-smile:#fbbf24;--dot-frown:#f59e0b;--dot-neutral:#60a5fa;
  --progress-stroke:#7dd3c0;
}
[data-theme="light"]{
  --bg:#f0efe8;--bg-panel:#fff;--bg-card:#f8f8f5;
  --text:#2c2c2c;--text-muted:#999;
  --border:rgba(0,0,0,.06);--shadow:0 8px 40px rgba(0,0,0,.1);
  --dot-calm:#3b82f6;--dot-smile:#d97706;--dot-frown:#ea580c;--dot-neutral:#3b82f6;
  --progress-stroke:#0d9488;
}
[data-theme="warm"]{
  --bg:#1b1410;--bg-panel:#2a1f18;--bg-card:#1f1812;
  --text:#e8d5c0;--text-muted:#9b8c7c;
  --border:rgba(255,255,255,.04);
  --progress-stroke:#7dd3c0;
}

body{
  font-family:var(--font-ui);background:var(--bg);color:var(--text);
  height:100dvh;width:100vw;overflow:hidden;
  display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;
  transition:background var(--transition),color var(--transition);
}

/* ============================================================
   Hidden video (offscreen, for MediaPipe only)
   ============================================================ */
#video{
  position:fixed;left:-9999px;top:0;width:640px;height:480px;
  opacity:0;pointer-events:none;z-index:-1;
}

/* ============================================================
   White Noise Bar
   ============================================================ */
#soundbar{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;justify-content:center;
  background:rgba(255,255,255,.02);
  border-bottom:1px solid var(--border);
  z-index:20;flex-shrink:0;
  transition:background var(--transition);
}
.sound-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:16px;padding:4px 12px;
  color:var(--text-muted);font-size:11px;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;gap:4px;
  font-family:var(--font-ui);
}
.sound-btn.active{border-color:var(--progress-stroke);color:var(--progress-stroke);background:rgba(125,211,192,.08)}
.sound-btn:hover{border-color:rgba(255,255,255,.2)}
.sound-btn .s-icon{font-size:14px}
#sound-vol{width:60px;accent-color:var(--progress-stroke);height:3px;cursor:pointer}
#sound-vol-label{font-size:9px;color:var(--text-muted);min-width:22px;text-align:right}

/* ============================================================
   Main Stage
   ============================================================ */
#main-stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:16px;position:relative;z-index:10;overflow-y:auto;
  perspective:1200px;
}
#stage-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;width:100%;max-width:420px;
}

/* ============================================================
   3D Flip Card
   ============================================================ */
#flip-scene{width:280px;height:280px;flex-shrink:0}
.flip-card{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.4,0,.2,1);
  cursor:pointer;border-radius:50%;
}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:50%;overflow:hidden;
  box-shadow:0 0 50px rgba(0,0,0,.4),0 0 0 2px var(--border);
}

/* === FRONT FACE: Pomodoro timer === */
.flip-front{
  background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,.06);
}
.flip-front svg{
  position:absolute;width:100%;height:100%;
  transform:rotate(-90deg);
}
#progress-bg{
  fill:none;stroke:rgba(255,255,255,.04);stroke-width:3;
}
#progress-fill{
  fill:none;stroke:var(--progress-stroke);stroke-width:3;
  stroke-linecap:round;
  stroke-dasharray:879;stroke-dashoffset:879;
  transition:stroke-dashoffset 1s linear;
}
#front-timer{
  font-size:42px;font-weight:200;color:#e5e5e5;
  letter-spacing:2px;font-variant-numeric:tabular-nums;
  z-index:2;text-align:center;
}
#front-status{
  font-size:11px;color:rgba(255,255,255,.35);margin-top:6px;
  font-weight:300;letter-spacing:1px;text-align:center;z-index:2;
  position:absolute;top:62%;left:0;right:0;
}
#front-content{display:flex;flex-direction:column;align-items:center;z-index:2}

/* === BACK FACE: Camera mirror === */
.flip-back{
  background:#000;
  border:1.5px solid rgba(255,255,255,.08);
  transform:rotateY(180deg);
}
.flip-back video{
  width:100%;height:100%;object-fit:cover;
  transform:scaleX(-1);
  filter:blur(.3px) saturate(.8) contrast(.95) brightness(1.1);
}
#mood-glow{
  position:absolute;inset:0;border-radius:50%;
  box-shadow:inset 0 0 80px rgba(96,165,250,.12);
  pointer-events:none;z-index:2;
  transition:box-shadow 5s ease;
}
#mood-glow.smiling{box-shadow:inset 0 0 80px rgba(251,191,36,.18)}
#mood-glow.frowning{box-shadow:inset 0 0 80px rgba(245,158,11,.14)}
.flip-back .back-hint{
  position:absolute;bottom:22px;left:0;right:0;text-align:center;
  font-size:10px;color:rgba(255,255,255,.25);
  font-weight:300;opacity:0;transition:opacity .6s;z-index:3;
  pointer-events:none;
}
.flip-card:hover .back-hint,.flip-card.flipped .back-hint{opacity:1}

/* Flip hint below */
#flip-hint{
  text-align:center;font-size:11px;color:rgba(255,255,255,.2);
  font-weight:300;transition:opacity .5s;margin-top:-4px;
  height:16px;
}

/* ============================================================
   Action info & buttons
   ============================================================ */
#action-info{text-align:center}
#action-info .main-label{font-size:16px;font-weight:600;letter-spacing:1px;transition:color .3s}
#action-info .sub-label{font-size:11px;color:var(--text-muted);margin-top:2px;line-height:1.5}
#manual-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.act-btn{
  padding:7px 14px;border-radius:18px;border:1px solid var(--border);
  background:var(--bg-panel);color:var(--text);
  font-size:12px;font-weight:500;cursor:pointer;
  font-family:var(--font-ui);
  transition:all var(--transition);
  white-space:nowrap;
}
.act-btn:hover{transform:translateY(-1px)}
.act-btn:active{transform:scale(.96)}
.act-btn.frown:hover{background:var(--dot-frown);color:#000;border-color:var(--dot-frown)}
.act-btn.smile:hover{background:var(--dot-smile);color:#000;border-color:var(--dot-smile)}
.act-btn.note:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#note-input-row{display:none;width:100%;gap:6px}
#note-input-row.show{display:flex}
#note-input-row input{
  flex:1;padding:8px 14px;border-radius:18px;
  border:1px solid var(--accent);background:var(--bg);
  color:var(--text);font-size:13px;font-family:var(--font-ui);
  outline:none;
}
#note-input-row button{
  padding:8px 16px;border-radius:18px;border:none;
  background:var(--accent);color:#fff;font-size:13px;
  cursor:pointer;font-family:var(--font-ui);font-weight:500;
}

/* ============================================================
   Status Dot (bottom-left corner)
   ============================================================ */
#status-dot-wrap{
  position:fixed;bottom:68px;left:16px;z-index:25;
  display:none;align-items:center;gap:7px;
}
#status-dot-wrap.active{display:flex}
#status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--dot-calm);
  box-shadow:0 0 12px var(--dot-calm),0 0 24px var(--dot-calm);
  transition:background 5s ease,box-shadow 5s ease;
}
#status-dot.smiling{background:var(--dot-smile);box-shadow:0 0 14px var(--dot-smile),0 0 28px var(--dot-smile)}
#status-dot.frowning{background:var(--dot-frown);box-shadow:0 0 14px var(--dot-frown),0 0 28px var(--dot-frown)}
#status-dot-tip{
  font-size:9px;color:var(--text-muted);opacity:0;
  transition:opacity .6s;white-space:nowrap;
  pointer-events:none;
}
#status-dot-wrap:hover #status-dot-tip{opacity:1}

/* ============================================================
   Summary Overlay
   ============================================================ */
#summary-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .5s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#summary-overlay.open{opacity:1;pointer-events:auto}
#summary-scroll{
  background:var(--bg-panel);border-radius:var(--radius);
  width:520px;max-width:92vw;max-height:88vh;
  overflow-y:auto;padding:32px 28px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  transition:background var(--transition);
}
#summary-scroll h3{font-size:17px;font-weight:600;margin-bottom:4px;letter-spacing:.5px}
#summary-scroll .s-date{font-size:11px;color:var(--text-muted);margin-bottom:20px}
#summary-scroll .s-section-label{
  font-size:10px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px;
}
#summary-scroll .s-section-label:first-of-type{margin-top:0}
#emotion-curve{
  width:100%;height:200px;border-radius:var(--radius-sm);
  background:var(--bg-card);border:1px solid var(--border);
}
#emotion-curve-hint{text-align:center;font-size:10px;color:var(--text-muted);margin-top:4px}
.s-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.s-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;text-align:center;
}
.s-card .s-card-icon{font-size:28px;margin-bottom:6px}
.s-card .s-card-num{font-size:22px;font-weight:700;letter-spacing:.5px}
.s-card .s-card-label{font-size:10px;color:var(--text-muted);margin-top:3px}
.s-card .s-card-compare{font-size:10px;color:var(--accent);margin-top:4px;font-style:italic}
.s-encourage{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:18px;
  font-size:14px;line-height:1.8;letter-spacing:.3px;
  color:var(--text);font-style:italic;
}
.s-encourage::before{content:'💬 ';font-style:normal}
.s-timeline{max-height:180px;overflow-y:auto}
.s-tl-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.s-tl-item:last-child{border-bottom:none}
.s-tl-item .s-tl-time{color:var(--text-muted);font-size:10px;white-space:nowrap;min-width:32px}
.s-tl-item .s-tl-icon{font-size:14px;min-width:20px;text-align:center}
.s-tl-item .s-tl-text{flex:1}
.s-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.s-actions button{
  padding:8px 20px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);cursor:pointer;
  font-size:12px;font-family:var(--font-ui);transition:all var(--transition);
}
.s-actions button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.s-actions button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ============================================================
   Status Bar
   ============================================================ */
#status-bar{
  height:50px;display:flex;align-items:center;
  padding:0 14px;gap:12px;
  background:var(--bg-panel);border-top:1px solid var(--border);
  z-index:20;transition:background var(--transition);flex-shrink:0;
}
#status-bar .stat{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
#status-bar .spacer{flex:1}
#btn-read{
  padding:7px 22px;border-radius:20px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--font-ui);letter-spacing:.5px;
  transition:all var(--transition);white-space:nowrap;
}
#btn-read.start{background:var(--accent);color:#fff;box-shadow:0 2px 14px var(--accent-glow)}
#btn-read.stop{background:var(--danger);color:#fff}
#btn-read:hover{transform:translateY(-1px)}
#btn-read:active{transform:scale(.97)}
.icon-btn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.icon-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ============================================================
   Panels
   ============================================================ */
.panel-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-back.open{opacity:1;pointer-events:auto}
.panel{
  position:fixed;top:0;bottom:0;width:360px;max-width:90vw;
  background:var(--bg-panel);z-index:55;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow);
  transition:transform .35s cubic-bezier(.4,0,.2,1),background var(--transition);
  overflow:hidden;
}
.panel.left{left:0;transform:translateX(-100%)}
.panel.right{right:0;transform:translateX(100%)}
.panel.open{transform:translateX(0)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-head h4{font-size:15px;font-weight:600}
.panel-head .close{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-size:16px}
.panel-head .close:hover{background:var(--danger);color:#fff}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px}
.set-item{margin-bottom:18px}
.set-item label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.set-item input[type=range]{width:100%;accent-color:var(--accent)}
.set-item .range-ends{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted)}
.set-item .range-val{text-align:center;font-size:11px;color:var(--accent);margin-top:2px}
.set-item select{
  width:100%;padding:8px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--bg);
  color:var(--text);font-size:13px;font-family:var(--font-ui);outline:none;
}
.theme-row{display:flex;gap:7px}
.theme-opt{flex:1;padding:9px 4px;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;text-align:center;font-size:11px;transition:all var(--transition)}
.theme-opt:hover{border-color:var(--accent)}
.theme-opt.sel{border-color:var(--accent);background:rgba(99,102,241,.1)}
.theme-opt .dot{width:18px;height:18px;border-radius:50%;margin:0 auto 4px}
.set-item button{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font-ui);cursor:pointer;transition:all var(--transition)}
.set-item button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Diary list */
.d-empty{text-align:center;padding:36px 12px;color:var(--text-muted);font-size:13px}
.d-card{background:var(--bg);border-radius:var(--radius-sm);padding:13px;margin-bottom:10px;border:1px solid var(--border)}
.d-card .d-date{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.d-card .d-summary{font-size:12px;margin-bottom:6px}
.d-card .d-enc{font-size:11px;font-style:italic;color:var(--accent);margin-bottom:6px;line-height:1.4}
.d-card .d-btns{display:flex;gap:4px;flex-wrap:wrap}
.d-card .d-btns button{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:10px}
.d-card .d-btns button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.d-card .d-btns button.del:hover{background:var(--danger);border-color:var(--danger)}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-back.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--bg-panel);border-radius:var(--radius);width:480px;max-width:90vw;max-height:82vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border)}
.modal-box h4{font-size:15px;margin-bottom:14px}
.modal-box .tl-mini{max-height:200px;overflow-y:auto;margin-bottom:12px}
.modal-box .tl-mini .tl-item{font-size:11px;padding:3px 0}
.modal-box .m-btns{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
.modal-box .m-btns button{padding:7px 16px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:12px;transition:all var(--transition)}
.modal-box .m-btns button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-box .m-btns button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tl-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.tl-item:last-child{border-bottom:none}
.tl-item .tl-time{color:var(--text-muted);font-size:11px;white-space:nowrap;min-width:36px}
.tl-item .tl-icon{font-size:16px;min-width:22px;text-align:center}
.tl-item .tl-text{flex:1}

/* Toast */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:20px;background:var(--bg-panel);color:var(--text);font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;border:1px solid var(--border)}
#toast.show{opacity:1}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

@media(max-width:768px){
  #flip-scene{width:220px;height:220px}
  #front-timer{font-size:34px}
  #soundbar{gap:3px;padding:6px 10px}
  .sound-btn{padding:3px 10px;font-size:10px}
  #status-bar{padding:0 8px;gap:6px;height:46px}
  .panel{width:100vw;max-width:100vw}
  #stage-inner{gap:8px}
  #summary-scroll{padding:24px 16px}
  #emotion-curve{height:150px}
  .s-cards{grid-template-columns:repeat(3,1fr)}
  #status-dot-wrap{bottom:56px;left:10px}
}
</style>
</head>
<body data-theme="dark">

<!-- Hidden video for MediaPipe processing only -->
<video id="video" autoplay playsinline></video>

<!-- White Noise Bar -->
<div id="soundbar">
  <button class="sound-btn active" data-sound="rain"><span class="s-icon">🌧️</span>雨声</button>
  <button class="sound-btn" data-sound="cafe"><span class="s-icon">☕</span>咖啡馆</button>
  <button class="sound-btn" data-sound="forest"><span class="s-icon">🌲</span>森林</button>
  <button class="sound-btn" data-sound="silence"><span class="s-icon">🔇</span>安静</button>
  <input type="range" id="sound-vol" min="0" max="100" value="25">
  <span id="sound-vol-label">25%</span>
</div>

<!-- Main Stage -->
<div id="main-stage">
  <div id="stage-inner">

    <!-- 3D Flip Card -->
    <div id="flip-scene">
      <div class="flip-card" id="flipCard">
        <!-- Front: Pomodoro timer -->
        <div class="flip-face flip-front">
          <svg viewBox="0 0 280 280">
            <circle id="progress-bg" cx="140" cy="140" r="135"/>
            <circle id="progress-fill" cx="140" cy="140" r="135"/>
          </svg>
          <div id="front-content">
            <div id="front-timer">25:00</div>
          </div>
          <div id="front-status">等待开始</div>
        </div>
        <!-- Back: Camera mirror -->
        <div class="flip-face flip-back">
          <video id="flip-video" autoplay playsinline muted></video>
          <div id="mood-glow"></div>
          <div class="back-hint">正在陪伴你</div>
        </div>
      </div>
    </div>

    <!-- Flip hint -->
    <div id="flip-hint">点击圆环，看看自己</div>

    <!-- Action info -->
    <div id="action-info">
      <div class="main-label" id="action-label" style="color:var(--dot-calm)">等待开始</div>
      <div class="sub-label" id="action-sub">模型加载完成后点击开始专注</div>
    </div>

    <!-- Manual action buttons -->
    <div id="manual-actions">

<script type="module">
/* ============================================================
   CONFIG
   ============================================================ */
const CFG={fps:12,camW:640,camH:480};

/* ============================================================
   DOM helpers & refs
   ============================================================ */
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const D={
  video:$('#video'),flipVideo:$('#flip-video'),
  flipCard:$('#flipCard'),flipHint:$('#flip-hint'),
  frontTimer:$('#front-timer'),frontStatus:$('#front-status'),
  moodGlow:$('#mood-glow'),progressFill:$('#progress-fill'),
  actionLabel:$('#action-label'),actionSub:$('#action-sub'),
  manualActions:$('#manual-actions'),noteInputRow:$('#note-input-row'),
  noteInput:$('#note-input'),noteConfirm:$('#note-confirm'),
  statusDotWrap:$('#status-dot-wrap'),statusDot:$('#status-dot'),
  frownCount:$('#frown-count'),smileCount:$('#smile-count'),timer:$('#timer'),
  btnRead:$('#btn-read'),
  summaryOverlay:$('#summary-overlay'),summaryScroll:$('#summary-scroll'),
  summaryTitle:$('#summary-title'),summaryDate:$('#summary-date'),
  emotionCurve:$('#emotion-curve'),emotionCurveHint:$('#emotion-curve-hint'),
  summaryCards:$('#summary-cards'),summaryTimeline:$('#summary-timeline'),
  summaryEncourage:$('#summary-encourage'),
  settingsPanel:$('#settings-panel'),settingsBack:$('#settings-back'),
  diaryPanel:$('#diary-panel'),diaryBack:$('#diary-back'),
  diaryScroll:$('#diary-scroll'),modalBack:$('#modal-back'),modalBox:$('#modal-box'),
  toast:$('#toast'),
};

/* ============================================================
   STATE
   ============================================================ */
const S={
  isReading:false,sessionStart:null,sessionSeconds:0,timerInt:null,
  pomodoroSeconds:25*60,pomodoroRemaining:0,
  timeline:[],
  lastTrigger:{frown:0,smile:0},
  curEmotion:null,
  fl:null,cameraStream:null,
  visible:true,
  settings:{frownSens:50,smileSens:50,debounceMs:3000,theme:'dark',pomodoroMin:25,soundVol:25,soundType:'rain'},
  recentFrown:0,recentSmile:0,
  neutralBaseline:null,
  calibrating:false,_calSamples:[],_calTarget:36,
  emotionSamples:[],_lastSampleMinute:-1,
  headPoseHistory:[],
  _currentDiary:null,
  // Flip state
  isFlipped:false,
  // PiP countdown timer
  pipMode:null,pipWindow:null,_pipTimerInt:null,
  // White noise
  _audioCtx:null,_noiseSource:null,_noiseGain:null,
};

/* ============================================================
   FLIP LOGIC
   ============================================================ */
function setFlip(flipped){
  S.isFlipped=flipped;
  D.flipCard.classList.toggle('flipped',flipped);
  D.flipHint.textContent=flipped?'点击翻回专注':'点击圆环，看看自己';
}
function toggleFlip(){
  setFlip(!S.isFlipped);
  if(S.isReading&&S.isFlipped){
    // User flipped to see themselves — auto-flip back after 8s
    clearTimeout(S._autoFlipBack);
    S._autoFlipBack=setTimeout(()=>{if(S.isReading)setFlip(false);},8000);
  }
}
function autoFlipToBack(){if(!S.isFlipped)setFlip(true)}
function autoFlipToFront(){if(S.isFlipped)setFlip(false)}

/* ============================================================
   WHITE NOISE
   ============================================================ */
async function initAudio(){
  if(S._audioCtx)return;
  S._audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  S._noiseGain=S._audioCtx.createGain();
  S._noiseGain.gain.value=S.settings.soundVol/100*.35;
  S._noiseGain.connect(S._audioCtx.destination);
}
function stopNoise(){
  if(S._noiseSource){try{S._noiseSource.stop()}catch(e){}S._noiseSource=null}
}
function playNoise(type){
  if(!S._audioCtx)return;
  stopNoise();
  const ctx=S._audioCtx;
  // Create a simple noise buffer
  const sr=ctx.sampleRate,len=sr*3;
  const buf=ctx.createBuffer(1,len,sr);
  const data=buf.getChannelData(0);
  for(let i=0;i<len;i++){
    if(type==='rain'){
      // Rain: filtered pink-ish noise with random drops
      data[i]=(Math.random()-.5)*(Math.random()<.03?3:1)*.4;
    }else if(type==='cafe'){
      // Cafe: low-freq hum + occasional clinks
      data[i]=(Math.random()-.5)*.15+(Math.random()<.001?Math.random():0);
    }else if(type==='forest'){
      // Forest: softer noise with rare chirps
      data[i]=(Math.random()-.5)*(Math.random()<.005?1.5:.25);
    }
  }
  S._noiseSource=ctx.createBufferSource();
  S._noiseSource.buffer=buf;
  S._noiseSource.loop=true;
  // Add subtle filter
  const filter=ctx.createBiquadFilter();
  filter.type='lowpass';filter.frequency.value=type==='cafe'?800:3000;
  S._noiseSource.connect(filter);
  filter.connect(S._noiseGain);
  S._noiseSource.start();
}
function updateNoiseVolume(){
  if(S._noiseGain)S._noiseGain.gain.value=S.settings.soundVol/100*.35;
}

/* ============================================================
   PROGRESS RING
   ============================================================ */
const PROGRESS_CIRCUMFERENCE=2*Math.PI*135; // r=135 → ~848.23
function updateProgressRing(){
  if(!S.isReading||S.calibrating)return;
  const total=S.pomodoroSeconds;
  const elapsed=total-S.pomodoroRemaining;
  const pct=Math.min(1,elapsed/total);
  const offset=PROGRESS_CIRCUMFERENCE*(1-pct);
  D.progressFill.style.strokeDashoffset=offset;
}

/* ============================================================
   HELPER: extract blendshape score
   ============================================================ */
function getBS(blendshapes,name){
  const cat=blendshapes.find(b=>b.categoryName===name);
  return cat?cat.score:0;
}

/* ============================================================
   HELPER: extract head pose angles
   ============================================================ */
function extractHeadPose(matrixData){
  const m=matrixData;
  const R00=m[0],R01=m[1],R02=m[2];
  const R10=m[4],R11=m[5],R12=m[6];
  const R20=m[8],R21=m[9],R22=m[10];
  const pitch=Math.atan2(-R12,Math.sqrt(R11*R11+R10*R10));
  const yaw=Math.atan2(R02,R00);
  return{pitch:pitch*180/Math.PI,yaw:yaw*180/Math.PI};
}

/* ============================================================
   DETECTION: baseline from calibration samples
   ============================================================ */
function computeBaseline(samples){
  const keys=['mouthSmile','browDown','browInnerUp','eyeBlink'];
  const bl={};
  for(const k of keys){
    const vals=samples.map(s=>s[k]);
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const variance=vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length;
    bl[k]={mean,std:Math.max(Math.sqrt(variance),1e-6)};
  }
  return bl;
}

/* ============================================================
   DETECTION: process one frame's blendshapes + head pose
   ============================================================ */
function detectAction(blendshapes,headPose){
  const mouthSmile=(getBS(blendshapes,'mouthSmileLeft')+getBS(blendshapes,'mouthSmileRight'))/2;
  const browDown=(getBS(blendshapes,'browDownLeft')+getBS(blendshapes,'browDownRight'))/2;
  const browInnerUp=getBS(blendshapes,'browInnerUp');
  const eyeBlink=(getBS(blendshapes,'eyeBlinkLeft')+getBS(blendshapes,'eyeBlinkRight'))/2;
  const m={mouthSmile,browDown,browInnerUp,eyeBlink};

  if(S.calibrating){
    S._calSamples.push(m);
    const remain=Math.ceil((S._calTarget-S._calSamples.length)/12);
    if(remain>0)D.actionSub.textContent='保持自然表情… '+remain;
    if(S._calSamples.length>=S._calTarget){
      S.neutralBaseline=computeBaseline(S._calSamples);
      S.calibrating=false;S._calSamples=null;
      D.actionSub.textContent='皱眉或微笑来记录，或点击下方按钮 ✨';
      D.actionLabel.textContent='专注中…';D.actionLabel.style.color='var(--dot-calm)';
      if(typeof finishCalibration==='function')finishCalibration();
    }
    return{action:null,intensity:0};
  }

  if(!S.neutralBaseline)return{action:null,intensity:0};

  const bl=S.neutralBaseline;
  const smileZ=(mouthSmile-bl.mouthSmile.mean)/bl.mouthSmile.std;
  const frownZ=(browDown-bl.browDown.mean)/bl.browDown.std;
  const th=sens=>3.0-sens/100*2.0;
  const smileTh=th(S.settings.smileSens);
  const frownTh=th(S.settings.frownSens);
  const browUpZ=(browInnerUp-bl.browInnerUp.mean)/bl.browInnerUp.std;

  const smileDetected=smileZ>smileTh;
  const frownDetected=frownZ>frownTh&&browUpZ<1.0;

  const CONFIRM=3;
  if(frownDetected){S.recentFrown++;S.recentSmile=0;}
  else{S.recentFrown=Math.max(0,S.recentFrown-1);}
  if(smileDetected){S.recentSmile++;S.recentFrown=0;}
  else{S.recentSmile=Math.max(0,S.recentSmile-1);}

  const frownConfirmed=S.recentFrown>=CONFIRM;
  const smileConfirmed=S.recentSmile>=CONFIRM;

  if(smileConfirmed&&frownConfirmed)return{action:'smile',intensity:smileZ};
  if(smileConfirmed)return{action:'smile',intensity:smileZ};
  if(frownConfirmed)return{action:'frown',intensity:frownZ};

  if(headPose){
    S.headPoseHistory.push({pitch:headPose.pitch,yaw:headPose.yaw,ts:Date.now()});
    if(S.headPoseHistory.length>30)S.headPoseHistory.shift();
    if(S.headPoseHistory.length>10){
      const recent=S.headPoseHistory.slice(-10);
      const avgPitch=recent.reduce((s,h)=>s+h.pitch,0)/recent.length;
      const avgYaw=recent.reduce((s,h)=>s+h.yaw,0)/recent.length;
      const pitchDev=Math.abs(headPose.pitch-avgPitch);
      const yawDev=Math.abs(headPose.yaw-avgYaw);
      if(pitchDev>12)return{action:'nod',intensity:pitchDev/30};
      if(yawDev>16)return{action:'shake',intensity:yawDev/30};
    }
  }
  return{action:null,intensity:0};
}

/* ============================================================
   DEBOUNCE
   ============================================================ */
function canTrigger(action){
  const now=Date.now();
  return now-S.lastTrigger[action]>=S.settings.debounceMs;
}

/* ============================================================
   RECORD ACTION
   ============================================================ */
function recordAction(action,text){
  const now=new Date();
  const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const entry={timestamp:Date.now(),time,type:action};
  if(text)entry.text=text;
  S.timeline.push(entry);

  if(action==='frown'||action==='smile'){
    S.lastTrigger[action]=Date.now();
    S.recentFrown=0;S.recentSmile=0;
    S.curEmotion=action;
  }

  updateStatusDot();
  updateMoodGlow();

  const emojis={smile:'🙂',frown:'😤',nod:'😌',shake:'🤔',note:'📝'};
  const labels={smile:'微笑了',frown:'皱眉了',nod:'点头',shake:'摇头',note:'备注'};
  const colors={smile:'var(--dot-smile)',frown:'var(--dot-frown)',nod:'var(--dot-calm)',shake:'var(--dot-calm)',note:'var(--accent)'};
  if(action!=='note'){
    D.actionLabel.textContent=emojis[action]+' '+labels[action];
    D.actionLabel.style.color=colors[action];
  }

  updatePiP();
  updateCounts();
  sampleEmotion();
}

/* ============================================================
   MOOD GLOW (back face)
   ============================================================ */
function updateMoodGlow(){
  D.moodGlow.classList.remove('smiling','frowning');
  if(S.curEmotion==='smile')D.moodGlow.classList.add('smiling');
  else if(S.curEmotion==='frown')D.moodGlow.classList.add('frowning');
  clearTimeout(S._glowTimer);
  S._glowTimer=setTimeout(()=>{
    D.moodGlow.classList.remove('smiling','frowning');
    S.curEmotion=null;
  },8000);
}

function updateStatusDot(){
  D.statusDot.classList.remove('smiling','frowning');
  if(S.curEmotion==='smile')D.statusDot.classList.add('smiling');
  else if(S.curEmotion==='frown')D.statusDot.classList.add('frowning');
  clearTimeout(S._dotTimer);
  S._dotTimer=setTimeout(()=>{
    D.statusDot.classList.remove('smiling','frowning');
  },8000);
}

/* ============================================================
   EMOTION SAMPLING
   ============================================================ */
function sampleEmotion(){
  if(!S.sessionStart)return;
  const elapsedMin=Math.floor((Date.now()-S.sessionStart)/60000);
  if(elapsedMin===S._lastSampleMinute)return;
  S._lastSampleMinute=elapsedMin;
  const cutoff=Date.now()-60000;
  const recent=S.timeline.filter(e=>e.timestamp>=cutoff);
  let smileCount=0,frownCount=0;
  for(const e of recent){
    if(e.type==='smile')smileCount++;
    else if(e.type==='frown')frownCount++;
  }
  const valence=Math.max(-1,Math.min(1,(smileCount-frownCount)/Math.max(1,smileCount+frownCount)));
  S.emotionSamples.push({minute:elapsedMin,valence,smileCount,frownCount});
}

/* ============================================================
   UPDATE COUNTS
   ============================================================ */
function updateCounts(){
  let f=0,s=0;
  for(const e of S.timeline){if(e.type==='frown')f++;else if(e.type==='smile')s++;}
  D.frownCount.textContent=f;D.smileCount.textContent=s;
}

/* ============================================================
   PICTURE-IN-PICTURE — countdown timer
   ============================================================ */
async function enterPiP(){
  if('documentPictureInPicture' in window){
    try{
      const pw=await documentPictureInPicture.requestWindow({width:200,height:200});
      pw.document.write(`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,#1e1b4b 0%,#0d0d1a 100%)}
#d-countdown{font-size:56px;font-weight:200;color:#e0e0e0;letter-spacing:3px;text-align:center;font-variant-numeric:tabular-nums}
#d-label{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-top:6px;letter-spacing:1px}
</style></head><body><div><div id="d-countdown">25:00</div><div id="d-label">专注中</div></div></body></html>`);
      pw.document.close();
      S.pipMode='document';S.pipWindow=pw;
      S._pipTimerInt=setInterval(()=>{
        try{
          const el=pw.document.getElementById('d-countdown');
          if(el){
            const m=Math.floor(S.pomodoroRemaining/60),s=S.pomodoroRemaining%60;
            el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
          }
        }catch(e){clearInterval(S._pipTimerInt)}
      },1000);
      pw.addEventListener('pagehide',()=>{
        S.pipWindow=null;S.pipMode=null;
        if(S._pipTimerInt){clearInterval(S._pipTimerInt);S._pipTimerInt=null;}
        if(S.isReading)setTimeout(enterPiP,600);
      });
      return;
    }catch(e){}
  }
  // Fallback: canvas-based countdown via video PiP
  try{
    const cv=document.createElement('canvas');cv.width=256;cv.height=256;
    const ctx=cv.getContext('2d');
    const drawCD=()=>{
      ctx.clearRect(0,0,256,256);
      const bg=ctx.createRadialGradient(128,128,10,128,128,180);
      bg.addColorStop(0,'#1e1b4b');bg.addColorStop(1,'#0d0d1a');
      ctx.fillStyle=bg;ctx.fillRect(0,0,256,256);
      const m=Math.floor(S.pomodoroRemaining/60),s=S.pomodoroRemaining%60;
      ctx.fillStyle='#e0e0e0';
      ctx.font='56px "PingFang SC","Hiragino Sans GB",sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'),128,118);
      ctx.fillStyle='rgba(255,255,255,.4)';
      ctx.font='13px "PingFang SC","Hiragino Sans GB",sans-serif';
      ctx.fillText('专注中',128,170);
    };
    drawCD();
    const stream=cv.captureStream(1);
    const pipVid=document.createElement('video');
    pipVid.muted=true;pipVid.playsInline=true;
    pipVid.srcObject=stream;pipVid.play();
    pipVid.style.cssText='position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none';
    document.body.appendChild(pipVid);
    S._pipTimerInt=setInterval(drawCD,1000);
    pipVid.addEventListener('leavepictureinpicture',()=>{
      if(S._pipTimerInt){clearInterval(S._pipTimerInt);S._pipTimerInt=null;}
      pipVid.remove();
      if(S.isReading)setTimeout(enterPiP,600);
    });
    await pipVid.requestPictureInPicture();
    S.pipMode='video';
  }catch(e){}
}
async function exitPiP(){
  if(S._pipTimerInt){clearInterval(S._pipTimerInt);S._pipTimerInt=null;}
  if(S.pipMode==='document'&&S.pipWindow){
    try{S.pipWindow.close()}catch(e){}
    S.pipWindow=null;S.pipMode=null;return;
  }
  if(document.pictureInPictureElement){
    try{await document.exitPictureInPicture()}catch(e){}
  }
  S.pipMode=null;
}
function updatePiP(){}

/* ============================================================
   CAMERA & MODEL
   ============================================================ */
async function setupCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:CFG.camW},height:{ideal:CFG.camH},facingMode:'user'},audio:false
    });
    S.cameraStream=stream;D.video.srcObject=stream;await D.video.play();
    // Also set flip video on back face
    D.flipVideo.srcObject=stream.clone();
    D.flipVideo.play();
    return true;
  }catch(e){toast('❌ 无法访问摄像头');return false}
}

const{FaceLandmarker,FilesetResolver}=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs');

async function setupFL(){
  try{
    D.actionSub.textContent='正在下载模型…';
    const v=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
    D.actionSub.textContent='正在加载模型…';

      runningMode:'VIDEO',numFaces:1,

/* ============================================================
   DETECTION LOOP
   ============================================================ */
function detectFace(){
  if(!S.fl||!S.visible)return;
  if(D.video.readyState<2)return;
  const r=S.fl.detectForVideo(D.video,performance.now());
  if(!r.faceLandmarks||!r.faceLandmarks.length)return;
  const blendshapes=r.faceBlendshapes?.[0]?.categories||[];
  let headPose=null;
  if(r.facialTransformationMatrixes?.length>0){
    headPose=extractHeadPose(r.facialTransformationMatrixes[0].data);
  }
  if(S.isReading){
    const result=detectAction(blendshapes,headPose);
    if(result.action&&canTrigger(result.action)){
      recordAction(result.action);
    }
  }
}

let _loopId=null;
function startLoop(){stopLoop();_loopId=setInterval(detectFace,1000/CFG.fps)}
function stopLoop(){if(_loopId){clearInterval(_loopId);_loopId=null}}

/* ============================================================
   POMODORO TIMER
   ============================================================ */
let _pomodoroInterval=null;
function startPomodoro(){
  S.pomodoroRemaining=S.pomodoroSeconds;
  updateTimerDisplay();
  updateProgressRing();
  _pomodoroInterval=setInterval(()=>{
    S.pomodoroRemaining--;
    updateTimerDisplay();
    updateProgressRing();
    if(S.pomodoroRemaining<=0){
      clearInterval(_pomodoroInterval);_pomodoroInterval=null;
      onTimerComplete();
    }
  },1000);
}
function stopPomodoro(){
  if(_pomodoroInterval){clearInterval(_pomodoroInterval);_pomodoroInterval=null}
}
function updateTimerDisplay(){
  const m=Math.floor(S.pomodoroRemaining/60),s=S.pomodoroRemaining%60;
  D.frontTimer.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function onTimerComplete(){
  toast('⏰ 专注时间到！');
  // Auto-flip to back (camera) face
  autoFlipToBack();
  // Then show summary after 3 seconds
  setTimeout(()=>{stopReading();},3000);
}

/* ============================================================
   READING SESSION
   ============================================================ */
function startReading(){
  if(!S.fl){toast('⚠️ 模型还在加载中…');return}
  S.isReading=true;S.sessionStart=null;S.sessionSeconds=0;S.timeline=[];
  S.emotionSamples=[];S._lastSampleMinute=-1;
  S.lastTrigger={frown:0,smile:0};S.curEmotion=null;
  S.recentFrown=0;S.recentSmile=0;
  S.headPoseHistory=[];
  S.calibrating=true;S._calSamples=[];S.neutralBaseline=null;

  // Flip to front (timer)
  autoFlipToFront();

  D.btnRead.textContent='⏹ 结束专注';D.btnRead.className='stop';
  D.actionSub.textContent='保持自然表情… 3';
  D.actionLabel.textContent='⏳ 校准中';
  D.actionLabel.style.color='var(--accent)';
  D.frontStatus.textContent='校准中';
  D.moodGlow.classList.remove('smiling','frowning');
  D.statusDotWrap.classList.add('active');
  D.statusDot.classList.remove('smiling','frowning');
  D.progressFill.style.strokeDashoffset=PROGRESS_CIRCUMFERENCE;

  // White noise
  initAudio().then(()=>{if(S.settings.soundType!=='silence')playNoise(S.settings.soundType)});

  updateCounts();
  startLoop();
  enterPiP();
}

function finishCalibration(){
  S.sessionStart=Date.now();
  S.pomodoroSeconds=S.settings.pomodoroMin*60;
  startPomodoro();
  S.timerInt=setInterval(()=>{S.sessionSeconds++;updateTimer()},1000);
  D.frontStatus.textContent='专注中';
  toast('✅ 校准完成，开始专注！');
}

function stopReading(){
  if(!S.isReading)return;
  S.isReading=false;
  S.calibrating=false;S._calSamples=null;
  stopPomodoro();
  clearInterval(S.timerInt);S.timerInt=null;
  stopLoop();stopNoise();
  exitPiP();clearTimeout(S._autoFlipBack);
  S.neutralBaseline=null;

  D.btnRead.textContent='▶ 开始专注';D.btnRead.className='start';
  D.actionSub.textContent='可以再次开始';
  D.actionLabel.textContent='等待开始';D.actionLabel.style.color='var(--dot-calm)';
  D.frontStatus.textContent='等待开始';
  D.moodGlow.classList.remove('smiling','frowning');
  D.statusDotWrap.classList.remove('active');
  D.statusDot.classList.remove('smiling','frowning');
  D.progressFill.style.strokeDashoffset=PROGRESS_CIRCUMFERENCE;
  D.frontTimer.textContent=S.settings.pomodoroMin+':00';

  const mins=Math.round(S.sessionSeconds/60*10)/10;
  if(S.timeline.length>0){
    const d=genDiary(mins);
    saveDiary(d);
    // Auto-flip to back, then show summary
    autoFlipToBack();
    setTimeout(()=>showSummary(d),1500);

  }else{
    toast('📖 专注结束');

}

/* ============================================================
   EMOTION CURVE (Canvas, hand-drawn style)
   ============================================================ */
function drawEmotionCurve(diary){
  const canvas=D.emotionCurve;
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*2;canvas.height=200*2;
  canvas.style.width=rect.width+'px';canvas.style.height='200px';
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  const W=rect.width-40,H=180;
  const pad={top:20,right:20,bottom:30,left:30};
  const pw=W-pad.left-pad.right,ph=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);

  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=.5;
  for(let i=0;i<=4;i++){
    const y=pad.top+ph*i/4;
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
  }

  const samples=diary.emotionSamples||[];
  const totalMin=diary.durationMinutes||1;
  let points=[];
  if(samples.length>0){
    points=samples.map(s=>({
      x:pad.left+(s.minute/totalMin)*pw,
      y:pad.top+ph/2-(s.valence*(ph/2-10)),
      valence:s.valence,minute:s.minute,
    }));
  }
  if(points.length<2){
    const bins={};
    for(const e of diary.timeline||[]){
      if(e.type!=='smile'&&e.type!=='frown')continue;
      const[min]=e.time.split(':').map(Number);
      if(!bins[min])bins[min]={smile:0,frown:0};
      if(e.type==='smile')bins[min].smile++;
      else bins[min].frown++;
    }
    for(const[min,bin]of Object.entries(bins)){
      const v=Math.max(-1,Math.min(1,(bin.smile-bin.frown)/Math.max(1,bin.smile+bin.frown)));
      points.push({x:pad.left+(Number(min)/totalMin)*pw,y:pad.top+ph/2-v*(ph/2-10),valence:v,minute:Number(min)});
    }
    points.sort((a,b)=>a.minute-b.minute);
  }
  if(points.length>0){
    if(points[0].minute>0)points.unshift({x:pad.left,y:pad.top+ph/2,valence:0,minute:0});
    if(points[points.length-1].minute<totalMin)points.push({x:W-pad.right,y:pad.top+ph/2,valence:0,minute:totalMin});
  }
  if(points.length===0)points=[{x:pad.left,y:pad.top+ph/2},{x:W-pad.right,y:pad.top+ph/2}];

  const jitter=()=>(Math.random()-.5)*1.8;
  ctx.strokeStyle='rgba(180,180,200,.7)';ctx.lineWidth=1.8;
  ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);
  for(let i=0;i<points.length-1;i++){
    const p0=points[Math.max(0,i-1)],p1=points[i],p2=points[i+1],p3=points[Math.min(points.length-1,i+2)];
    ctx.bezierCurveTo(p1.x+(p2.x-p0.x)/6+jitter(),p1.y+(p2.y-p0.y)/6+jitter(),p2.x-(p3.x-p1.x)/6+jitter(),p2.y-(p3.y-p1.y)/6+jitter(),p2.x,p2.y);
  }
  ctx.stroke();

  const keyEvents=[];
  for(const e of diary.timeline||[]){
    if(e.type!=='smile'&&e.type!=='frown')continue;
    const[min,sec]=(e.time||'0:00').split(':').map(Number);
    const t=(min||0)+(sec||0)/60;
    keyEvents.push({x:pad.left+(t/totalMin)*pw,y:pad.top+ph/2-(e.type==='smile'?.6:-.6)*(ph/2-10),type:e.type,time:e.time});
  }
  for(const ev of keyEvents){
    const color=ev.type==='smile'?'#fbbf24':'#f59e0b';
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(ev.x,ev.y,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=color+'44';ctx.beginPath();ctx.arc(ev.x,ev.y,7,0,Math.PI*2);ctx.fill();
  }

  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(pad.left,pad.top+ph/2);ctx.lineTo(W-pad.right,pad.top+ph/2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='9px "PingFang SC","Hiragino Sans GB",sans-serif';
  ctx.textAlign='left';
  ctx.fillText('🙂',pad.left-20,pad.top+4);
  ctx.fillText('😐',pad.left-20,pad.top+ph/2+3);
  ctx.fillText('😤',pad.left-20,pad.top+ph-4);
  ctx.textAlign='center';
  ctx.fillText('0',pad.left,pad.top+ph+16);
  ctx.fillText(Math.round(totalMin)+'min',W-pad.right,pad.top+ph+16);
  if(points.length>=2){const mid=Math.round(totalMin/2);ctx.fillText(mid+'min',pad.left+pw/2,pad.top+ph+16);}
  D.emotionCurveHint.textContent=keyEvents.length>0?'● '+keyEvents.length+' 个关键时刻':'数据点较少，再做一次专注吧';
}

function renderSummaryCards(diary){
  const d=diary;
  const prev=loadDiaries()[1];
  const nodCount=(d.timeline||[]).filter(e=>e.type==='nod').length;
  const shakeCount=(d.timeline||[]).filter(e=>e.type==='shake').length;
  const cards=[
    {icon:'🙂',num:d.smileCount+' 次',label:'微笑',compare:compareText(prev,'smileCount',d.smileCount,'次')},
    {icon:'😤',num:d.frownCount+' 次',label:'皱眉',compare:compareText(prev,'frownCount',d.frownCount,'次')},
    {icon:'⏱',num:d.durationMinutes+' 分钟',label:'专注时长',compare:compareText(prev,'durationMinutes',d.durationMinutes,'分钟')},
  ];
  if(nodCount>0)cards.push({icon:'😌',num:nodCount+' 次',label:'点头',compare:'可能在思考或认同'});
  if(shakeCount>0)cards.push({icon:'🤔',num:shakeCount+' 次',label:'摇头',compare:'可能遇到了困难'});
  D.summaryCards.innerHTML=cards.map(c=>
    '<div class="s-card"><div class="s-card-icon">'+c.icon+'</div><div class="s-card-num">'+c.num+'</div><div class="s-card-label">'+c.label+'</div>'+(c.compare?'<div class="s-card-compare">'+c.compare+'</div>':'')+'</div>'
  ).join('');
}
function compareText(prev,key,current,unit){
  if(!prev||prev[key]===undefined)return '这是第一次 ✨';
  const diff=current-prev[key];
  if(diff===0)return '和上次一样';
  if(diff>0)return '比上次多 '+diff+' '+unit;
  return '比上次少 '+Math.abs(diff)+' '+unit;
}

/* ============================================================
   DIARY GENERATION
   ============================================================ */
function genDiary(mins){
  const tl=S.timeline;
  let frownCount=0,smileCount=0,nodCount=0,shakeCount=0;
  const manualNotes=[];
  for(const e of tl){
    if(e.type==='frown')frownCount++;
    else if(e.type==='smile')smileCount++;
    else if(e.type==='nod')nodCount++;
    else if(e.type==='shake')shakeCount++;
    else if(e.type==='note'&&e.text)manualNotes.push(e.text);
  }
  let hardest={time:'—',density:0};
  if(frownCount>0){
    const windows=[];
    for(const e of tl){
      if(e.type!=='frown')continue;
      const[min,sec]=(e.time||'0:0').split(':').map(Number);
      const totalMin=(min||0)+(sec||0)/60;
      const w=Math.floor(totalMin/5);
      if(!windows[w])windows[w]={start:w*5,count:0};
      windows[w].count++;
    }
    let maxW=windows[0]||{start:0,count:0};
    for(const w of windows){if(w&&w.count>maxW.count)maxW=w;}
    hardest={time:'第 '+maxW.start+' 分钟左右',density:maxW.count};
  }
  const enc=genEnc(frownCount,smileCount,nodCount,shakeCount,mins,hardest);
  return{
    id:new Date().toISOString().replace(/[:.]/g,'-'),
    date:fmt(new Date()),timestamp:Date.now(),
    durationMinutes:mins,
    frownCount,smileCount,nodCount,shakeCount,
    manualNotes,hardestPeriod:hardest,
    timeline:tl,emotionSamples:S.emotionSamples,
    encouragementText:enc,
  };
}
function genEnc(fc,sc,nc,shc,mins,hardest){
  const t=[];
  if(fc>8&&mins>20)t.push('今天皱了 '+fc+' 次眉，但你坚持了 '+mins+' 分钟，了不起。');
  if(hardest.time!=='—'&&hardest.density>2)t.push(hardest.time+'遇到了最难啃的一段，密集皱眉 '+hardest.density+' 次，但你都扛过来了。');
  if(sc>5)t.push('微笑了 '+sc+' 次，这本书给了你不少惊喜，阅读是快乐的。');
  if(sc>0&&fc>0&&sc>=fc)t.push('皱眉 '+fc+' 次，微笑 '+sc+' 次——快乐比困难多，这就是阅读的意义。');
  if(sc>0&&fc>0&&fc>sc)t.push('皱眉 '+fc+' 次，微笑 '+sc+' 次——阅读就是这样，有难有懂，但你坚持住了。');
  if(fc===0&&sc===0)t.push('读了 '+mins+' 分钟，平静而专注。心流是最珍贵的状态。');
  if(nc>3)t.push('你点了 '+nc+' 次头，像是在和书中的思想对话，这种感觉很美妙。');
  if(shc>3)t.push('你摇了 '+shc+' 次头，可能遇到了困惑，但困惑正是理解的开始。');
  if(fc<=3&&fc>0&&sc===0)t.push('只有 '+fc+' 次皱眉，你大部分时间都很平静，这种定力很难得。');
  if(!t.length)t.push(mins<5?'虽然只专注了 '+mins+' 分钟，每一分钟都在认真思考。':'专注了 '+mins+' 分钟，每次翻页都是向前一步。');
  return t[Math.floor(Math.random()*t.length)];
}

function showDetail(diary){
  const d=diary,b=D.modalBox,bk=D.modalBack;
  const tl=(d.timeline||[]).map(e=>'<div class="tl-item"><span class="tl-time">'+e.time+'</span> <span class="tl-icon">'+(e.type==='frown'?'😤':e.type==='smile'?'🙂':e.type==='nod'?'😌':e.type==='shake'?'🤔':'📝')+'</span> <span class="tl-text">'+(e.text||(e.type==='frown'?'皱眉':e.type==='smile'?'微笑':e.type==='nod'?'点头':e.type==='shake'?'摇头':'备注'))+'</span></div>').reverse().join('');
  b.innerHTML='<h4>📔 '+d.date+'</h4><p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">⏱ '+d.durationMinutes+' 分钟 | 😤 皱眉 '+d.frownCount+' 次 | 🙂 微笑 '+d.smileCount+' 次</p><div class="tl-mini">'+tl+'</div><p style="font-size:12px;color:var(--accent);font-style:italic;margin-top:8px;">💬 '+d.encouragementText+'</p><div class="m-btns"><button class="primary" id="m-json">📥 JSON</button><button class="primary" id="m-md">📥 MD</button><button id="m-del" style="color:var(--danger);border-color:var(--danger)">🗑 删除</button><button id="m-close">关闭</button></div>';
  bk.classList.add('open');
  $('#m-close').onclick=()=>bk.classList.remove('open');
  $('#m-json').onclick=()=>exportDiary(diary,'json');
  $('#m-md').onclick=()=>exportDiary(diary,'md');
  $('#m-del').onclick=()=>{if(confirm('删除？')){deleteDiary(diary.id);bk.classList.remove('open')}};
  bk.onclick=e=>{if(e.target===bk)bk.classList.remove('open')};
}

/* ============================================================
   NOTE INPUT
   ============================================================ */
function showNoteInput(){D.noteInputRow.classList.add('show');D.noteInput.value='';D.noteInput.focus()}
function hideNoteInput(){D.noteInputRow.classList.remove('show')}
function confirmNote(){
  const text=D.noteInput.value.trim();
  if(!text)return;
  recordAction('note',text);
  hideNoteInput();
}

/* ============================================================
   SETTINGS
   ============================================================ */
function loadSettings(){
  try{const s=JSON.parse(localStorage.getItem(KC));if(s)S.settings={...S.settings,...s}}catch(e){}
  applySettings();
}
function saveSettings(){localStorage.setItem(KC,JSON.stringify(S.settings))}
function applySettings(){
  const s=S.settings;
  $('#s-frown-sens').value=s.frownSens;
  $('#s-smile-sens').value=s.smileSens;
  $('#s-debounce').value=Math.round(s.debounceMs/100);
  $('#debounce-val').textContent=(s.debounceMs/1000).toFixed(1)+'秒';
  $('#s-pomodoro').value=String(s.pomodoroMin);
  D.frontTimer.textContent=s.pomodoroMin+':00';
  S.pomodoroSeconds=s.pomodoroMin*60;
  D.progressFill.style.strokeDashoffset=PROGRESS_CIRCUMFERENCE;
  document.body.dataset.theme=s.theme;
  $$('.theme-opt').forEach(o=>o.classList.toggle('sel',o.dataset.theme===s.theme));
  // Sound
  $('#sound-vol').value=s.soundVol;
  $('#sound-vol-label').textContent=s.soundVol+'%';
  $$('.sound-btn').forEach(b=>b.classList.toggle('active',b.dataset.sound===s.soundType));
  updateNoiseVolume();
}

/* ============================================================
   EVENTS
   ============================================================ */
function bindEvents(){
  // Flip card click
  D.flipCard.addEventListener('click',e=>{
    // Don't flip if clicking during calibration
    if(S.calibrating)return;
    toggleFlip();
  });

  // Sound bar
  $$('.sound-btn').forEach(b=>b.onclick=()=>{
    S.settings.soundType=b.dataset.sound;
    $$('.sound-btn').forEach(x=>x.classList.toggle('active',x.dataset.sound===S.settings.soundType));
    saveSettings();
    if(!S.isReading)return;
    initAudio().then(()=>{
      if(S.settings.soundType==='silence')stopNoise();
      else playNoise(S.settings.soundType);
    });
  });
  $('#sound-vol').oninput=e=>{
    S.settings.soundVol=+e.target.value;
    $('#sound-vol-label').textContent=S.settings.soundVol+'%';
    saveSettings();
    updateNoiseVolume();
  };

  // Reading
  D.btnRead.onclick=()=>S.isReading?stopReading():startReading();

  // Manual buttons
  $('#btn-manual-frown').onclick=()=>{if(S.isReading)recordAction('frown')};
  $('#btn-manual-smile').onclick=()=>{if(S.isReading)recordAction('smile')};
  $('#btn-manual-note').onclick=()=>{if(S.isReading)showNoteInput()};

  // Note input
  D.noteConfirm.onclick=confirmNote;
  D.noteInput.onkeydown=e=>{if(e.key==='Enter')confirmNote();else if(e.key==='Escape')hideNoteInput()};

  // Panels
  $('#btn-diary').onclick=()=>{renderDiaryList();togglePanel(D.diaryPanel,D.diaryBack)};
  $('#close-diary').onclick=()=>{D.diaryPanel.classList.remove('open');D.diaryBack.classList.remove('open')};
  D.diaryBack.onclick=()=>{D.diaryPanel.classList.remove('open');D.diaryBack.classList.remove('open')};
  $('#btn-settings').onclick=()=>togglePanel(D.settingsPanel,D.settingsBack);
  $('#close-settings').onclick=()=>{D.settingsPanel.classList.remove('open');D.settingsBack.classList.remove('open')};
  D.settingsBack.onclick=()=>{D.settingsPanel.classList.remove('open');D.settingsBack.classList.remove('open')};

  // Settings inputs
  $('#s-frown-sens').oninput=e=>{S.settings.frownSens=+e.target.value;saveSettings()};
  $('#s-smile-sens').oninput=e=>{S.settings.smileSens=+e.target.value;saveSettings()};
  $('#s-debounce').oninput=e=>{S.settings.debounceMs=+e.target.value*100;$('#debounce-val').textContent=(S.settings.debounceMs/1000).toFixed(1)+'秒';saveSettings()};
  $('#s-pomodoro').onchange=e=>{S.settings.pomodoroMin=+e.target.value;S.pomodoroSeconds=S.settings.pomodoroMin*60;D.frontTimer.textContent=S.settings.pomodoroMin+':00';D.progressFill.style.strokeDashoffset=PROGRESS_CIRCUMFERENCE;saveSettings()};
  $$('.theme-opt').forEach(o=>o.onclick=()=>{S.settings.theme=o.dataset.theme;saveSettings();applySettings()});
  $('#btn-export-all').onclick=exportAllDiaries;
  $('#btn-clear-all').onclick=clearAllData;

  // Summary close
  D.summaryOverlay.addEventListener('click',function(e){if(e.target===this)closeSummary()});

  // Global Escape
  document.onkeydown=e=>{
    if(e.key==='Escape'){
      if(D.summaryOverlay.classList.contains('open')){closeSummary();return}
      $$('.panel.open').forEach(p=>p.classList.remove('open'));
      $$('.panel-back.open').forEach(b=>b.classList.remove('open'));
      D.modalBack.classList.remove('open');
      hideNoteInput();
    }
  };
}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&!S.pipMode)S.visible=false;
  else if(!document.hidden)S.visible=true;
});
window.addEventListener('beforeunload',()=>{
  if(S.isReading&&S.timeline.length>0){
    saveDiary(genDiary(Math.round(S.sessionSeconds/60*10)/10));
  }
});

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  loadSettings();bindEvents();
  // Set initial progress ring
  D.progressFill.style.strokeDashoffset=PROGRESS_CIRCUMFERENCE;

  const camOk=await setupCamera();
  if(!camOk){D.actionSub.textContent='无法访问摄像头，请检查权限';return}

  const flOk=await setupFL();
  if(!flOk){D.actionSub.textContent='模型加载失败，请刷新重试';return}

  D.actionSub.textContent='可以开始专注了 ✨';
  D.actionLabel.textContent='等待开始';
  startLoop();
  // Pre-init audio context on user gesture
  document.addEventListener('click',()=>initAudio(),{once:true});
}
init().catch(err=>{console.error(err);toast('⚠️ 初始化失败，请刷新')});
</script>
</body>
