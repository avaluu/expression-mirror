<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>表情镜 v2.0 — 动作触发版</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--bg-panel:#16162a;
  --text:#e0e0e0;--text-muted:#888;
  --accent:#6366f1;--accent-glow:rgba(99,102,241,.35);
  --danger:#ef4444;
  --frown-color:#f59e0b;--smile-color:#fbbf24;
  --border:rgba(255,255,255,.06);
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 40px rgba(0,0,0,.5);
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --transition:.35s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f0efe8;--bg-panel:#fff;
  --text:#2c2c2c;--text-muted:#999;
  --border:rgba(0,0,0,.06);--shadow:0 8px 40px rgba(0,0,0,.1);
}
[data-theme="warm"]{
  --bg:#1b1410;--bg-panel:#2a1f18;
  --text:#e8d5c0;--text-muted:#9b8c7c;
  --border:rgba(255,255,255,.04);
}

body{
  font-family:var(--font-ui);background:var(--bg);color:var(--text);
  height:100dvh;width:100vw;overflow:hidden;
  display:flex;flex-direction:column;
  user-select:none;-webkit-user-select:none;
  transition:background var(--transition),color var(--transition);
}

/* Particle canvas */
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:5}

/* ============================================================
   Main Stage
   ============================================================ */
#main-stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;z-index:10;overflow-y:auto;
}

#stage-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;width:100%;max-width:420px;
}

#mirror-ring{
  width:240px;height:240px;border-radius:50%;
  border:3px solid var(--border);background:#000;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;flex-shrink:0;
  box-shadow:var(--shadow);
  transition:background var(--transition),box-shadow .3s;
}
#mirror-ring.flash-frown{box-shadow:0 0 40px rgba(245,158,11,.6),var(--shadow)}
#mirror-ring.flash-smile{box-shadow:0 0 40px rgba(251,191,36,.6),var(--shadow)}

#mirror-ring video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transform:scaleX(-1);
}
#mirror-ring video.hidden{opacity:0}

/* Emoji avatar (shown when camera off) */
#avatar-face{
  font-size:100px;line-height:1;z-index:2;
  pointer-events:none;display:none;
  transition:transform .15s;
}
#avatar-face.bounce{
  animation:pop .5s cubic-bezier(.68,-.55,.265,1.55);
}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}

#mirror-ring .ring-label{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.55);
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  pointer-events:none;z-index:2;
}

#mirror-ring .cam-btn{
  position:absolute;bottom:8px;right:10px;
  width:30px;height:30px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.45);color:#fff;font-size:14px;
  cursor:pointer;z-index:5;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
  backdrop-filter:blur(4px);
}
#mirror-ring .cam-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5)}

/* Action info below mirror */
#action-info{text-align:center}
#action-info .main-label{font-size:20px;font-weight:700;letter-spacing:1px;transition:color .3s}
#action-info .sub-label{font-size:12px;color:var(--text-muted);margin-top:3px}

/* ============================================================
   Manual Action Buttons
   ============================================================ */
#manual-actions{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
}
.act-btn{
  padding:8px 16px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg-panel);color:var(--text);
  font-size:13px;font-weight:500;cursor:pointer;
  font-family:var(--font-ui);
  transition:all var(--transition);
  white-space:nowrap;
}
.act-btn:hover{transform:translateY(-1px)}
.act-btn:active{transform:scale(.96)}
.act-btn.frown:hover{background:var(--frown-color);color:#000;border-color:var(--frown-color)}
.act-btn.smile:hover{background:var(--smile-color);color:#000;border-color:var(--smile-color)}
.act-btn.note:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Inline note input */
#note-input-row{
  display:none;width:100%;gap:6px;
}
#note-input-row.show{display:flex}
#note-input-row input{
  flex:1;padding:8px 14px;border-radius:18px;
  border:1px solid var(--accent);background:var(--bg);
  color:var(--text);font-size:13px;font-family:var(--font-ui);
  outline:none;
}
#note-input-row button{
  padding:8px 16px;border-radius:18px;border:none;
  background:var(--accent);color:#fff;font-size:13px;
  cursor:pointer;font-family:var(--font-ui);font-weight:500;
}

/* ============================================================
   Timeline items (shared: used in diary detail modal)
   ============================================================ */
.tl-item{
  display:flex;align-items:center;gap:8px;
  padding:5px 0;border-bottom:1px solid var(--border);
  font-size:12px;
}
.tl-item:last-child{border-bottom:none}
.tl-item .tl-time{color:var(--text-muted);font-size:11px;white-space:nowrap;min-width:36px}
.tl-item .tl-icon{font-size:16px;min-width:22px;text-align:center}
.tl-item .tl-text{flex:1}

/* ============================================================
   Status Bar
   ============================================================ */
#status-bar{
  height:54px;display:flex;align-items:center;
  padding:0 18px;gap:14px;
  background:var(--bg-panel);border-top:1px solid var(--border);
  z-index:20;transition:background var(--transition);flex-shrink:0;
}
#status-bar .stat{
  font-size:12px;color:var(--text-muted);
  display:flex;align-items:center;gap:4px;
}
#status-bar .spacer{flex:1}

#btn-read{
  padding:7px 24px;border-radius:22px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:var(--font-ui);letter-spacing:.5px;
  transition:all var(--transition);white-space:nowrap;
}
#btn-read.start{background:var(--accent);color:#fff;box-shadow:0 2px 14px var(--accent-glow)}
#btn-read.stop{background:var(--danger);color:#fff}
#btn-read:hover{transform:translateY(-1px)}
#btn-read:active{transform:scale(.97)}

.icon-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text);cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.icon-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ============================================================
   Panels
   ============================================================ */
.panel-back{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-back.open{opacity:1;pointer-events:auto}
.panel{
  position:fixed;top:0;bottom:0;width:360px;max-width:90vw;
  background:var(--bg-panel);z-index:55;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow);
  transition:transform .35s cubic-bezier(.4,0,.2,1),background var(--transition);
  overflow:hidden;
}
.panel.left{left:0;transform:translateX(-100%)}
.panel.right{right:0;transform:translateX(100%)}
.panel.open{transform:translateX(0)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-head h4{font-size:15px;font-weight:600}
.panel-head .close{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font-size:16px}
.panel-head .close:hover{background:var(--danger);color:#fff}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px}

/* Settings */
.set-item{margin-bottom:18px}
.set-item label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.set-item input[type=range]{width:100%;accent-color:var(--accent)}
.set-item .range-ends{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted)}
.set-item .range-val{text-align:center;font-size:11px;color:var(--accent);margin-top:2px}
.theme-row{display:flex;gap:7px}
.theme-opt{flex:1;padding:9px 4px;border-radius:var(--radius-sm);border:2px solid var(--border);cursor:pointer;text-align:center;font-size:11px;transition:all var(--transition)}
.theme-opt:hover{border-color:var(--accent)}
.theme-opt.sel{border-color:var(--accent);background:rgba(99,102,241,.1)}
.theme-opt .dot{width:18px;height:18px;border-radius:50%;margin:0 auto 4px}
.set-item button{width:100%;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font-ui);cursor:pointer}

/* Diary */
.d-empty{text-align:center;padding:36px 12px;color:var(--text-muted);font-size:13px}
.d-card{background:var(--bg);border-radius:var(--radius-sm);padding:13px;margin-bottom:10px;border:1px solid var(--border)}
.d-card .d-date{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.d-card .d-summary{font-size:12px;margin-bottom:6px}
.d-card .d-enc{font-size:11px;font-style:italic;color:var(--accent);margin-bottom:6px;line-height:1.4}
.d-card .d-btns{display:flex;gap:4px;flex-wrap:wrap}
.d-card .d-btns button{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:10px}
.d-card .d-btns button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.d-card .d-btns button.del:hover{background:var(--danger);border-color:var(--danger)}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-back.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--bg-panel);border-radius:var(--radius);width:480px;max-width:90vw;max-height:82vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow);border:1px solid var(--border)}
.modal-box h4{font-size:15px;margin-bottom:14px}
.modal-box .tl-mini{max-height:200px;overflow-y:auto;margin-bottom:12px}
.modal-box .tl-mini .tl-item{font-size:11px;padding:3px 0}
.modal-box .m-btns{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
.modal-box .m-btns button{padding:7px 16px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-size:12px;transition:all var(--transition)}
.modal-box .m-btns button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-box .m-btns button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:20px;background:var(--bg-panel);color:var(--text);font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;border:1px solid var(--border)}
#toast.show{opacity:1}

/* ============================================================
   Bubble encouragement
   ============================================================ */
#bubble-container{position:fixed;inset:0;pointer-events:none;z-index:15}
.bubble{
  position:absolute;padding:10px 20px;border-radius:24px;
  font-size:14px;font-weight:500;white-space:nowrap;
  font-family:var(--font-ui);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 4px 24px rgba(0,0,0,.35);
  animation:bubbleUp 4.5s cubic-bezier(.22,.54,.36,.97) forwards;
  pointer-events:none;letter-spacing:.3px;
}
@keyframes bubbleUp{
  0%{opacity:0;transform:translateY(18px) scale(.75)}
  12%{opacity:1;transform:translateY(0) scale(1.06)}
  22%{transform:translateY(-6px) scale(1)}
  70%{opacity:.9}
  100%{opacity:0;transform:translateY(-140px) scale(.85)}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

@media(max-width:768px){
  #mirror-ring{width:180px;height:180px}
  #avatar-face{font-size:72px}
  #status-bar{padding:0 10px;gap:8px;height:46px}
  .panel{width:100vw;max-width:100vw}
  #stage-inner{gap:8px}
}
</style>
</head>
<body data-theme="dark">

<canvas id="particle-canvas"></canvas>

<div id="main-stage">
  <div id="stage-inner">
    <!-- Mirror -->
    <div id="mirror-ring">
      <video id="video" autoplay playsinline></video>
      <span id="avatar-face"></span>
      <span class="ring-label" id="ring-label">你</span>
      <button class="cam-btn" id="cam-btn" title="切换摄像头/表情">📷</button>
    </div>

    <!-- Action info -->
    <div id="action-info">
      <div class="main-label" id="action-label" style="color:#60a5fa">等待开始</div>
      <div class="sub-label" id="action-sub">模型加载完成后点击开始阅读</div>
    </div>

    <!-- Manual action buttons -->
    <div id="manual-actions">
      <button class="act-btn frown" id="btn-manual-frown">😤 好难</button>
      <button class="act-btn smile" id="btn-manual-smile">🙂 懂了</button>
      <button class="act-btn note" id="btn-manual-note">📝 写一句话</button>
    </div>

    <!-- Inline note input -->
    <div id="note-input-row">
      <input type="text" id="note-input" placeholder="写一句话…" maxlength="120">
      <button id="note-confirm">确认</button>
    </div>

  </div>
</div>

<div id="bubble-container"></div>

<div id="status-bar">
  <span class="stat">😤 <span id="frown-count">0</span></span>
  <span class="stat">🙂 <span id="smile-count">0</span></span>
  <span class="stat">⏱ <span id="timer">00:00</span></span>
  <span class="spacer"></span>
  <button id="btn-read" class="start">▶ 开始阅读</button>
  <button class="icon-btn" id="btn-diary">📔</button>
  <button class="icon-btn" id="btn-settings">⚙️</button>
</div>

<div class="panel-back" id="settings-back"></div>
<div class="panel left" id="settings-panel">
  <div class="panel-head"><h4>⚙️ 设置</h4><button class="close" id="close-settings">✕</button></div>
  <div class="panel-body">
    <div class="set-item">
      <label>皱眉灵敏度</label>
      <input type="range" id="s-frown-sens" min="0" max="100" value="50">
      <div class="range-ends"><span>难触发</span><span>易触发</span></div>
    </div>
    <div class="set-item">
      <label>微笑灵敏度</label>
      <input type="range" id="s-smile-sens" min="0" max="100" value="50">
      <div class="range-ends"><span>难触发</span><span>易触发</span></div>
    </div>
    <div class="set-item">
      <label>防抖间隔</label>
      <input type="range" id="s-debounce" min="10" max="100" value="30">
      <div class="range-ends"><span>1秒</span><span>10秒</span></div>
      <div class="range-val" id="debounce-val">3秒</div>
    </div>
    <div class="set-item">
      <label>视觉反馈强度</label>
      <input type="range" id="s-intensity" min="1" max="10" value="6">
      <div class="range-ends"><span>柔和</span><span>强烈</span></div>
    </div>
    <div class="set-item">
      <label>主题</label>
      <div class="theme-row">
        <div class="theme-opt sel" data-theme="dark"><div class="dot" style="background:#16162a"></div>暗夜</div>
        <div class="theme-opt" data-theme="light"><div class="dot" style="background:#f5f5f0"></div>明亮</div>
        <div class="theme-opt" data-theme="warm"><div class="dot" style="background:#2a1f18"></div>暖棕</div>
      </div>
    </div>
    <div class="set-item">
      <button id="btn-export-all">📤 导出全部日记 (JSON)</button>
      <button id="btn-clear-all" style="margin-top:7px;color:var(--danger);border-color:var(--danger)">🗑 清除全部数据</button>
    </div>
  </div>
</div>

<div class="panel-back" id="diary-back"></div>
<div class="panel right" id="diary-panel">
  <div class="panel-head"><h4>📔 读书日记</h4><button class="close" id="close-diary">✕</button></div>
  <div class="panel-body" id="diary-scroll">
    <div class="d-empty">还没有读书日记<br>开始你的第一次阅读吧 ✨</div>
  </div>
</div>

<div class="modal-back" id="modal-back"><div class="modal-box" id="modal-box"></div></div>
<div id="toast"></div>

<script type="module">
/* ============================================================
   CONFIG
   ============================================================ */
const CFG={fps:12,camW:640,camH:480,maxParticles:200};

/* ============================================================
   DOM
   ============================================================ */
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const D={
  mirrorRing:$('#mirror-ring'),video:$('#video'),
  avatarFace:$('#avatar-face'),ringLabel:$('#ring-label'),
  camBtn:$('#cam-btn'),actionLabel:$('#action-label'),actionSub:$('#action-sub'),
  manualActions:$('#manual-actions'),noteInputRow:$('#note-input-row'),
  noteInput:$('#note-input'),noteConfirm:$('#note-confirm'),
  frownCount:$('#frown-count'),smileCount:$('#smile-count'),timer:$('#timer'),
  btnRead:$('#btn-read'),
  settingsPanel:$('#settings-panel'),settingsBack:$('#settings-back'),
  diaryPanel:$('#diary-panel'),diaryBack:$('#diary-back'),
  diaryScroll:$('#diary-scroll'),modalBack:$('#modal-back'),modalBox:$('#modal-box'),
  toast:$('#toast'),pCvs:$('#particle-canvas'),pctx:null,
};

/* ============================================================
   STATE
   ============================================================ */
const S={
  isReading:false,sessionStart:null,sessionSeconds:0,timerInt:null,
  timeline:[],           // { time, action: 'frown'|'smile'|'note', text? }
  lastTrigger:{frown:0,smile:0}, // debounce timestamps
  curAction:null,        // 'frown' | 'smile' | null
  fl:null,cameraStream:null,
  visible:true,
  particles:[],animId:null,
  settings:{frownSens:50,smileSens:50,debounceMs:3000,intensity:6,theme:'dark'},
  cameraOn:true,pipMode:null,pipWindow:null,
  // Temporal smoothing: consecutive frame counters
  recentFrown:0,recentSmile:0,
  // Fixed baseline: computed once at session start from neutral frames
  // { mean, std } for each metric
  neutralBaseline:null,
  // Quick calibration at reading start
  calibrating:false,
  _calSamples:[],        // frames collected during calibration
  _calTarget:36,         // ~3 seconds at 12fps
};

/* ============================================================
   ACTION DEFINITIONS
   ============================================================ */
const ACT={
  frown:{emoji:'😤',label:'皱眉',color:'#f59e0b',pc:['#f59e0b','#ef4444','#f97316']},
  smile:{emoji:'🙂',label:'微笑',color:'#fbbf24',pc:['#fbbf24','#fcd34d','#fde68a']},
  note: {emoji:'📝',label:'备注',color:'#a78bfa',pc:['#a78bfa','#c4b5fd']},
};

const PC={
  frown:{sp:.5,sz:5,li:100,rate:8, dr:.1},
  smile:{sp:.7,sz:3,li:70, rate:10,dr:.4},
  note: {sp:.3,sz:4,li:100,rate:4, dr:.2},
};

/* ============================================================
   PARTICLE SYSTEM
   ============================================================ */
class Particle{
  constructor(x,y,action){
    const c=PC[action]||PC.frown,cl=(ACT[action]||ACT.frown).pc;
    this.x=x;this.y=y;this.vx=(Math.random()-.5)*c.sp*2;this.vy=(Math.random()-.5)*c.sp*2-c.sp*.5;
    this.l=c.li*(.7+Math.random()*.6);this.ml=this.l;this.s=c.sz*(.5+Math.random());
    this.co=cl[Math.floor(Math.random()*cl.length)];this.dr=c.dr;
  }
  up(){this.x+=this.vx;this.y+=this.vy;this.vx+=(Math.random()-.5)*this.dr;this.vy+=(Math.random()-.5)*this.dr;this.vx*=.995;this.vy*=.995;this.l--;return this.l>0}
  dr(ctx){const a=Math.max(0,this.l/this.ml),s=this.s*(.5+.5*a);ctx.save();ctx.globalAlpha=a*.6;ctx.fillStyle=this.co;ctx.shadowColor=this.co;ctx.shadowBlur=s*2;ctx.beginPath();ctx.arc(this.x,this.y,s,0,Math.PI*2);ctx.fill();ctx.restore()}
}
function spawnParticles(action){
  const f=S.settings.intensity/10,c=PC[action]||PC.frown,n=Math.floor(c.rate*f);
  const r=D.mirrorRing.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=120+Math.random()*200;S.particles.push(new Particle(cx+Math.cos(a)*d,cy+Math.sin(a)*d,action))}
  while(S.particles.length>CFG.maxParticles)S.particles.shift();
}
function particleLoop(){

/* ============================================================
   FACIAL METRICS — simplified for 2-action detection
   ============================================================ */
const d3=(a,b)=>Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+((a.z||0)-(b.z||0))**2);

function computeActionMetrics(lm){
  // All metrics normalized by eye distance for face-size invariance
  const eyeDist=d3(lm[33],lm[263])||0.01;
  const n=v=>v/eyeDist;

  // === Frown signals ===
  // Signal 1: inner brow distance — smaller = brows pulled together
  const innerBrowDist=n(d3(lm[107],lm[336]));
  // Signal 2: brow-to-eye distance — smaller = brows lowered
  // lm[105]=left brow center, lm[159]=left eye top; lm[334]=right brow center, lm[386]=right eye top
  const browToEye=n((d3(lm[105],lm[159])+d3(lm[334],lm[386]))/2);

  // === Smile signals ===
  const mouthLeft=lm[61],mouthRight=lm[291];
  const mouthWidth=d3(mouthLeft,mouthRight)||0.01;
  // Signal 1: mouth aspect ratio (width/height) — larger = smile stretches mouth wider
  const mouthHeight=d3(lm[13],lm[14])||0.01;
  const mouthAR=mouthWidth/mouthHeight;
  // Signal 2: mouth corner angle — positive = corners up (smile)
  const mouthAngle=(mouthLeft.y-mouthRight.y)/mouthWidth;

  return{innerBrowDist,browToEye,mouthAR,mouthAngle};
}

/* ============================================================
   ACTION DETECTION — fixed baseline, single primary signal
   ============================================================
   1. At startReading(), collect ~3s of neutral frames
   2. Compute per-user mean + std for innerBrowDist and mouthAR
   3. Detect frown/smile as z-score deviation from fixed baseline
   —  no rolling window, no baseline drift
   ============================================================ */

function computeBaseline(samples){
  const keys=['innerBrowDist','browToEye','mouthAR','mouthAngle'];
  const bl={};
  for(const k of keys){
    const vals=samples.map(s=>s[k]);
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    const variance=vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length;
    bl[k]={mean,std:Math.max(Math.sqrt(variance),1e-6)};
  }
  return bl;
}

function detectAction(m){
  // During calibration: collect samples, show countdown, no detection
  if(S.calibrating){
    S._calSamples.push(m);
    const remain=Math.ceil((S._calTarget-S._calSamples.length)/12);
    if(remain>0)D.actionSub.textContent='保持自然表情… '+remain;
    if(S._calSamples.length>=S._calTarget){
      S.neutralBaseline=computeBaseline(S._calSamples);
      S.calibrating=false;S._calSamples=null;
      D.actionSub.textContent='皱眉或微笑来记录，或点击下方按钮 ✨';
      D.actionLabel.textContent='等待动作…';D.actionLabel.style.color='#60a5fa';
      if(typeof finishCalibration==='function')finishCalibration();
    }
    return{action:null,frown:false,smile:false};
  }

  // Baseline not ready (before reading or failed calibration)
  if(!S.neutralBaseline)return{action:null,frown:false,smile:false};

  const bl=S.neutralBaseline;

  // === Primary signals ===
  // Frown: inner brows come together → innerBrowDist DECREASES
  const ibdZ=(bl.innerBrowDist.mean-m.innerBrowDist)/bl.innerBrowDist.std;
  // Smile: mouth stretches wide → mouthAR INCREASES
  const marZ=(m.mouthAR-bl.mouthAR.mean)/bl.mouthAR.std;

  // Sensitivity → z-score threshold
  // sens=50 → 2.0 (moderate), sens=0 → 3.0 (strict), sens=100 → 1.0 (easy)
  const th=sens=>3.0-sens/100*2.0;
  const frownTh=th(S.settings.frownSens);
  const smileTh=th(S.settings.smileSens);

  // Auxiliary: frown also requires brow-to-eye decrease (brows lowered)
  const bteZ=(bl.browToEye.mean-m.browToEye)/bl.browToEye.std;
  // Auxiliary: smile also checks mouth angle increase
  const maZ=(m.mouthAngle-bl.mouthAngle.mean)/bl.mouthAngle.std;

  // Frown: primary signal strong + auxiliary confirms direction
  const frownDetected=ibdZ>frownTh&&bteZ>0;
  // Smile: primary signal strong OR both signals moderately positive
  const smileDetected=marZ>smileTh||(marZ>smileTh*.5&&maZ>smileTh*.5);

  return confirmAction(frownDetected,smileDetected);
}

// Temporal smoothing: require N consecutive frames
function confirmAction(frownDetected,smileDetected){
  const CONFIRM_FRAMES=3;

  if(frownDetected){S.recentFrown++;S.recentSmile=0;}
  else{S.recentFrown=Math.max(0,S.recentFrown-1);}
  if(smileDetected){S.recentSmile++;S.recentFrown=0;}
  else{S.recentSmile=Math.max(0,S.recentSmile-1);}

  const frownConfirmed=S.recentFrown>=CONFIRM_FRAMES;
  const smileConfirmed=S.recentSmile>=CONFIRM_FRAMES;

  // Mutual exclusion: smile wins on tie
  if(smileConfirmed&&frownConfirmed)return{action:'smile',frown:false,smile:true};
  if(smileConfirmed)return{action:'smile',frown:false,smile:true};
  if(frownConfirmed)return{action:'frown',frown:true,smile:false};
  return{action:null,frown:false,smile:false};
}

/* ============================================================
   DEBOUNCE CHECK
   ============================================================ */
function canTrigger(action){
  const now=Date.now();
  return now-S.lastTrigger[action]>=S.settings.debounceMs;
}

/* ============================================================
   RECORD ACTION — event-driven
   ============================================================ */
function recordAction(action,text){
  const now=new Date();
  const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const entry={time,action};
  if(text)entry.text=text;

  S.timeline.push(entry);

  // Always reset debounce timer for this action (manual or auto)
  if(action==='frown'||action==='smile')S.lastTrigger[action]=Date.now();

  // Visual feedback
  flashMirror(action);
  spawnParticles(action);
  if(action!=='note')spawnBubble(action);

  // Update PiP
  const a=ACT[action];
  if(a)updatePiP(a.emoji,a.label,a.color);

  // Update counts
  updateCounts();

  // Update action label
  if(action!=='note'){
    S.curAction=action;
    D.actionLabel.textContent=a.emoji+' '+a.label;
    D.actionLabel.style.color=a.color;
  }

  // Update avatar when camera off
  if(!S.cameraOn&&action!=='note'){
    D.avatarFace.textContent=a.emoji;
    D.avatarFace.classList.remove('bounce');
    void D.avatarFace.offsetWidth;
    D.avatarFace.classList.add('bounce');
  }
}

function updateCounts(){
  let f=0,s=0;
  for(const e of S.timeline){if(e.action==='frown')f++;else if(e.action==='smile')s++;}
  D.frownCount.textContent=f;
  D.smileCount.textContent=s;
}

/* ============================================================

   ============================================================ */
function detectFace(){
  if(!S.fl||!S.visible)return;
  if(D.video.readyState<2)return;
  const r=S.fl.detectForVideo(D.video,performance.now());
  if(!r.faceLandmarks||!r.faceLandmarks.length){
    if(!S.isReading)S.curAction=null;
    return;
  }
  const m=computeActionMetrics(r.faceLandmarks[0]);

  if(S.isReading){
    const result=detectAction(m);
    if(result.action&&canTrigger(result.action)){
      S.lastTrigger[result.action]=Date.now();
      // Reset confirm counters to avoid re-trigger on next frame
      S.recentFrown=0;S.recentSmile=0;
      recordAction(result.action);
    }
  }
}

/* ============================================================
   DIARY
   ============================================================ */
function genDiary(mins){
  const tl=S.timeline;
  let frownCount=0,smileCount=0;
  const manualNotes=[];
  for(const e of tl){
    if(e.action==='frown')frownCount++;
    else if(e.action==='smile')smileCount++;
    else if(e.action==='note'&&e.text)manualNotes.push(e.text);
  }
  // Find most difficult period (densest frown cluster)
  let hardest={time:'—',density:0};
  if(frownCount>0){
    // Group frowns into 5-minute windows
    const windows=[];
    for(const e of tl){
      if(e.action!=='frown')continue;
      const[min,sec]=(e.time||'0:0').split(':').map(Number);
      const totalMin=(min||0)+(sec||0)/60;
      const w=Math.floor(totalMin/5);
      if(!windows[w])windows[w]={start:w*5,count:0};
      windows[w].count++;
    }
    let maxW=windows[0]||{start:0,count:0};
    for(const w of windows){if(w&&w.count>maxW.count)maxW=w;}
    hardest={time:'第 '+maxW.start+' 分钟左右',density:maxW.count};
  }
  const enc=genEnc(frownCount,smileCount,mins,hardest);
  return{
    id:new Date().toISOString().replace(/[:.]/g,'-'),
    date:fmt(new Date()),timestamp:Date.now(),
    durationMinutes:mins,
    frownCount,smileCount,
    manualNotes,
    hardestPeriod:hardest,
    timeline:tl,
    encouragementText:enc,
  };
}

function genEnc(fc,sc,mins,hardest){
  const t=[];
  if(fc>8&&mins>20)t.push('今天皱了 '+fc+' 次眉，但你坚持了 '+mins+' 分钟，了不起。');
  if(hardest.time!=='—'&&hardest.density>2)t.push(hardest.time+'遇到了最难啃的一段，密集皱眉 '+hardest.density+' 次。');
  if(sc>3)t.push('微笑了 '+sc+' 次，这本书给了你不少惊喜。');
  if(fc===0&&sc===0)t.push('读了 '+mins+' 分钟，平静而专注。');
  if(fc>0&&sc>0)t.push('皱眉 '+fc+' 次，微笑 '+sc+' 次——阅读就是这样，有难有懂。');
  if(!t.length)t.push(mins<5?'虽然只读了 '+mins+' 分钟，每一分钟都在认真思考。':'读了 '+mins+' 分钟，每次翻页都是向前一步。');
  return t[Math.floor(Math.random()*t.length)];
}

function updateTimer(){const m=Math.floor(S.sessionSeconds/60),s=S.sessionSeconds%60;D.timer.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function toast(msg){const t=D.toast;t.textContent=msg;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),2500)}

function togglePanel(p,b){
  const o=p.classList.contains('open');
  $$('.panel.open').forEach(x=>x.classList.remove('open'));
  $$('.panel-back.open').forEach(x=>x.classList.remove('open'));
  if(!o){p.classList.add('open');b.classList.add('open')}
}

function renderDiaryList(){
  const l=loadDiaries(),c=D.diaryScroll;
  if(!l.length){c.innerHTML='<div class="d-empty">还没有日记<br>开始吧 ✨</div>';return}
  c.innerHTML=l.map(d=>{
    const notes=(d.manualNotes||[]).slice(0,2).map(n=>'📝 '+n).join('<br>');
    return '<div class="d-card"><div class="d-date">📅 '+d.date+'</div><div class="d-summary">⏱ '+d.durationMinutes+' 分钟 | 😤 '+d.frownCount+' 次 | 🙂 '+d.smileCount+' 次'+(notes?'<br>'+notes:'')+'</div><div class="d-enc">💬 '+d.encouragementText+'</div><div class="d-btns"><button class="view" data-id="'+d.id+'">📋 详情</button><button class="json" data-id="'+d.id+'">JSON</button><button class="md" data-id="'+d.id+'">MD</button><button class="del" data-id="'+d.id+'">🗑</button></div></div>';
  }).join('');
  c.querySelectorAll('.view').forEach(b=>b.onclick=()=>{const d=l.find(x=>x.id===b.dataset.id);if(d)showDetail(d)});
  c.querySelectorAll('.json').forEach(b=>b.onclick=()=>{const d=l.find(x=>x.id===b.dataset.id);if(d)exportDiary(d,'json')});
  c.querySelectorAll('.md').forEach(b=>b.onclick=()=>{const d=l.find(x=>x.id===b.dataset.id);if(d)exportDiary(d,'md')});
  c.querySelectorAll('.del').forEach(b=>b.onclick=()=>{if(confirm('删除？'))deleteDiary(b.dataset.id)});
}

function showDetail(diary){
  const d=diary,b=D.modalBox,bk=D.modalBack;
  const tl=(d.timeline||[]).map(e=>'<div class="tl-item"><span class="tl-time">'+e.time+'</span> <span class="tl-icon">'+(e.action==='frown'?'😤':e.action==='smile'?'🙂':'📝')+'</span> <span class="tl-text">'+(e.text||(e.action==='frown'?'皱眉':e.action==='smile'?'微笑':'备注'))+'</span></div>').reverse().join('');
  const notes=(d.manualNotes||[]).map(n=>'<div style="font-size:11px;margin:2px 0">📝 '+n+'</div>').join('');
  b.innerHTML='<h4>📔 '+d.date+'</h4><p style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">⏱ '+d.durationMinutes+' 分钟 | 😤 皱眉 '+d.frownCount+' 次 | 🙂 微笑 '+d.smileCount+' 次</p>'+(notes?'<div style="margin-bottom:8px">'+notes+'</div>':'')+'<div class="tl-mini">'+tl+'</div><p style="font-size:12px;color:var(--accent);font-style:italic;margin-top:8px;">💬 '+d.encouragementText+'</p><div class="m-btns"><button class="primary" id="m-json">📥 JSON</button><button class="primary" id="m-md">📥 MD</button><button id="m-del" style="color:var(--danger);border-color:var(--danger)">🗑 删除</button><button id="m-close">关闭</button></div>';
  bk.classList.add('open');
  $('#m-close').onclick=()=>bk.classList.remove('open');
  $('#m-json').onclick=()=>exportDiary(diary,'json');
  $('#m-md').onclick=()=>exportDiary(diary,'md');
  $('#m-del').onclick=()=>{if(confirm('删除？')){deleteDiary(diary.id);bk.classList.remove('open')}};
  bk.onclick=e=>{if(e.target===bk)bk.classList.remove('open')};
}

/* ============================================================
   NOTE INPUT
   ============================================================ */
function showNoteInput(){
  D.noteInputRow.classList.add('show');
  D.noteInput.value='';
  D.noteInput.focus();
}
function hideNoteInput(){
  D.noteInputRow.classList.remove('show');
}
function confirmNote(){
  const text=D.noteInput.value.trim();
  if(!text)return;
  recordAction('note',text);
  hideNoteInput();
}

/* ============================================================
   SETTINGS
   ============================================================ */
function loadSettings(){
  try{const s=JSON.parse(localStorage.getItem(KC));if(s)S.settings={...S.settings,...s}}catch(e){}
  applySettings();
}
function saveSettings(){localStorage.setItem(KC,JSON.stringify(S.settings))}
function applySettings(){
  const s=S.settings;
  $('#s-frown-sens').value=s.frownSens;
  $('#s-smile-sens').value=s.smileSens;
  $('#s-debounce').value=Math.round(s.debounceMs/100);
  $('#debounce-val').textContent=(s.debounceMs/1000).toFixed(1)+'秒';
  $('#s-intensity').value=s.intensity;
  document.body.dataset.theme=s.theme;
  $$('.theme-opt').forEach(o=>o.classList.toggle('sel',o.dataset.theme===s.theme));
}

/* ============================================================
   CAMERA TOGGLE
   ============================================================ */
function toggleCamera(){
  S.cameraOn=!S.cameraOn;
  if(S.cameraOn){
    D.video.classList.remove('hidden');D.camBtn.textContent='📷';D.camBtn.title='切换为表情映射';
    D.ringLabel.textContent='你';D.mirrorRing.style.background='#000';D.avatarFace.style.display='none';
  }else{
    D.video.classList.add('hidden');D.camBtn.textContent='🎭';D.camBtn.title='显示摄像头';
    D.ringLabel.textContent='表情映射';
    const a=ACT[S.curAction]||{emoji:'😐'};
    D.avatarFace.textContent=a.emoji;D.avatarFace.style.display='flex';
    D.mirrorRing.style.background='var(--bg-panel)';
  }
}

/* ============================================================
   EVENTS
   ============================================================ */
function bindEvents(){
  D.btnRead.onclick=()=>S.isReading?stopReading():startReading();
  D.camBtn.onclick=e=>{e.stopPropagation();toggleCamera()};

  // Manual buttons
  $('#btn-manual-frown').onclick=()=>{if(S.isReading)recordAction('frown')};
  $('#btn-manual-smile').onclick=()=>{if(S.isReading)recordAction('smile')};
  $('#btn-manual-note').onclick=()=>{if(S.isReading)showNoteInput()};

  // Note input
  D.noteConfirm.onclick=confirmNote;
  D.noteInput.onkeydown=e=>{if(e.key==='Enter')confirmNote();else if(e.key==='Escape')hideNoteInput()};

  // Panels
  $('#btn-diary').onclick=()=>{renderDiaryList();togglePanel(D.diaryPanel,D.diaryBack)};
  $('#close-diary').onclick=()=>{D.diaryPanel.classList.remove('open');D.diaryBack.classList.remove('open')};
  D.diaryBack.onclick=()=>{D.diaryPanel.classList.remove('open');D.diaryBack.classList.remove('open')};
  $('#btn-settings').onclick=()=>togglePanel(D.settingsPanel,D.settingsBack);
  $('#close-settings').onclick=()=>{D.settingsPanel.classList.remove('open');D.settingsBack.classList.remove('open')};
  D.settingsBack.onclick=()=>{D.settingsPanel.classList.remove('open');D.settingsBack.classList.remove('open')};

  // Settings inputs
  $('#s-frown-sens').oninput=e=>{S.settings.frownSens=+e.target.value;saveSettings()};
  $('#s-smile-sens').oninput=e=>{S.settings.smileSens=+e.target.value;saveSettings()};
  $('#s-debounce').oninput=e=>{S.settings.debounceMs=+e.target.value*100;$('#debounce-val').textContent=(S.settings.debounceMs/1000).toFixed(1)+'秒';saveSettings()};
  $('#s-intensity').oninput=e=>{S.settings.intensity=+e.target.value;saveSettings()};
  $$('.theme-opt').forEach(o=>o.onclick=()=>{S.settings.theme=o.dataset.theme;saveSettings();applySettings()});
  $('#btn-export-all').onclick=exportAllDiaries;
  $('#btn-clear-all').onclick=clearAllData;

  // Global
  document.onkeydown=e=>{
    if(e.key==='Escape'){
      $$('.panel.open').forEach(p=>p.classList.remove('open'));
      $$('.panel-back.open').forEach(b=>b.classList.remove('open'));
      D.modalBack.classList.remove('open');
      hideNoteInput();
    }
  };
}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&!S.pipMode)S.visible=false;
  else if(!document.hidden)S.visible=true;
});
window.addEventListener('beforeunload',()=>{
  if(S.isReading&&S.timeline.length>0){saveDiary(genDiary(Math.round(S.sessionSeconds/60*10)/10))}
});

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  setupCanvas();S.animId=requestAnimationFrame(particleLoop);
  loadSettings();bindEvents();
  const camOk=await setupCamera();if(!camOk){D.actionSub.textContent='无法访问摄像头，请检查权限';return}
  const flOk=await setupFL();if(!flOk){D.actionSub.textContent='模型加载失败，请刷新重试';return}
  D.actionSub.textContent='可以开始阅读了 ✨';
  D.actionLabel.textContent='等待开始';
  startLoop();
}
init().catch(err=>{console.error(err);toast('⚠️ 初始化失败，请刷新')});
</script>
</body>
</html>
